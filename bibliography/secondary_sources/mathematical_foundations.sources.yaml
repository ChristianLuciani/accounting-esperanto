# Mathematical Foundations — source manifest
# Companion to mathematical_foundations.bib, ADR 012, and the preprint sections.
# APA 7 citations live in the preprint's Selected Bibliography; this file tracks
# acquisition + licensing so a download pass knows what is safe to fetch.

download_policy:
  open_ok: "Fetch the PDF into this folder (arXiv, PLoS/OA, or author-hosted copy)."
  paywalled: "DO NOT download the publisher PDF. Store the citation + link only;
    fetch only a legitimately open preprint/author copy if one exists."
  note: "Downloading any file requires explicit human authorization per the
    operating rules. This manifest only declares what would be permissible."

sources:
