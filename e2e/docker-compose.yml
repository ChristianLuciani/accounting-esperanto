# Kontablo two-ERP end-to-end stack.
#
# Stands up two different free, open-source ERPs (ERPNext/Frappe and Odoo),
# their datastores, and the Kontablo mapping API. The runner (e2e/runner.py)
# provisions a transnational group across the two ERPs, pulls each chart +
# trial balance through the Apache-2.0 connectors, and consolidates through
# Kontablo.
#
# Image versions are PINNED for reproducibility. Bump deliberately.
#
# Host ports (see e2e/README.md "Port registry"): never use 3000 (reserved,
# FINEXOS).
#   - Kontablo API : 8000
#   - ERPNext web  : 8081  -> container 8080
#   - Odoo web     : 8069
# Datastores (mariadb / postgres / redis) are internal to the compose network.

name: kontablo-e2e

services:
  # ------------------------------------------------------------------ #
  # Kontablo mapping API (deterministic core; /api/v1/map)
  # ------------------------------------------------------------------ #
  kontablo-api:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.kontablo-api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ------------------------------------------------------------------ #
  # Odoo (subsidiary ERP) — official image + postgres
  # ------------------------------------------------------------------ #
  odoo-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 12

  odoo:
    image: odoo:17.0
    depends_on:
      odoo-db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8069/web/database/selector || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s

  # ------------------------------------------------------------------ #
  # ERPNext / Frappe (parent ERP) — official frappe_docker images
  # mariadb + redis + the frappe app server.
  # ------------------------------------------------------------------ #
  erpnext-db:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - erpnext-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  erpnext-redis:
    image: redis:7.2-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # The frappe "configurator" prepares common_site_config, then the app server
  # creates the site on first boot. This mirrors the official frappe_docker
  # single-server compose pattern, trimmed to the services the e2e needs.
  erpnext:
    image: frappe/erpnext:v15.40.2
    depends_on:
      erpnext-db:
        condition: service_healthy
      erpnext-redis:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      # Consumed by the entrypoint / our provisioning bootstrap.
      DB_HOST: erpnext-db
      DB_PORT: "3306"
      REDIS_CACHE: erpnext-redis:6379
      REDIS_QUEUE: erpnext-redis:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      # Bootstrap script that creates the site + installs erpnext on first run.
      - ./provision/erpnext_bootstrap.sh:/opt/erpnext_bootstrap.sh:ro
    # The bootstrap is intentionally explicit (see e2e/README.md). On a fresh
    # volume it creates the site `kontablo.localhost`; afterwards it just serves.
    command: ["bash", "/opt/erpnext_bootstrap.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/method/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 90s

volumes:
  odoo-db-data:
  odoo-web-data:
  erpnext-db-data:
  erpnext-sites:
