## SECTION 5: DATA COLLECTION AND STORAGE

### 5.1 File Naming Convention

```
research/validation/interviews/
  {jurisdiction}_{reviewer_id}_{date}_profile.yaml
  {jurisdiction}_{reviewer_id}_{date}_mapping_review.csv
  {jurisdiction}_{reviewer_id}_{date}_interview_notes.md
```

### 5.2 Anonymization Rules

- Reviewer ID assigned by researcher on intake (RV-001 through RV-012)
- Firm name: convert to sector descriptor (e.g., "Big 4 firm" → "B4-1")
- Client names: never recorded; only industry sector
- Recording: deleted after transcription; transcript reviewed by reviewer before use

### 5.3 Synthesis Process

After all 12 interviews:
1. Calculate per-account confidence average across all reviewers
2. Identify accounts with confidence < 3.0 → redesign
3. Tabulate all Q16 suggestions → prioritize for v0.3
4. Update `core/schemas/level3_accounts.yaml` with validated confidence scores
5. Update `docs/papers/drafts/kontablo_paper_v01.md` Section 6 with results

