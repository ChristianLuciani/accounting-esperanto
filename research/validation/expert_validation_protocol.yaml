## SECTION 3: SEMI-STRUCTURED INTERVIEW QUESTIONS

*Estimated duration: 45–60 minutes*
*Interviewer: record responses verbatim or request permission to record audio*

### 3.1 Opening (5 min)

Q6: When you think about accounting standardization across countries, what is the single biggest challenge in your experience?

Q7: Have you ever encountered a situation where the same economic transaction was accounted for differently in two jurisdictions, creating consolidation problems? Can you describe it?

### 3.2 Kontablo Concept Review (15 min)

*[Present the interviewer with the one-page Kontablo summary — `docs/manuals/kontablo_explainer.md`]*

Q8: After reviewing the Kontablo concept, what is your immediate reaction?

Q9: Do you believe a universal Level 3 account taxonomy (30 core accounts) could realistically cover 90%+ of routine transactions in [their jurisdiction]? Why or why not?

Q10: What would you add to the 30 core accounts that you consider essential for your jurisdiction?

Q11: What in the 30 core accounts do you think is NOT applicable or incorrectly mapped for [their jurisdiction]?

### 3.3 Jurisdiction-Specific Deep Dive (15 min)

*Adapt to jurisdiction:*

**For MX:**
Q12-MX: How do you handle the distinction between IVA trasladado (output VAT) and IVA acreditable (input VAT) in your chart of accounts? Does Kontablo's proposed mapping correctly reflect that?

Q13-MX: The SAT requires CFDI electronic invoicing with specific account coding. Does Kontablo's abstraction layer create any conflicts with CFDI compliance?

**For BR:**
Q12-BR: Brazil has ICMS, PIS, COFINS, ISS, IPI — five separate tax contributions. How do you typically structure these in your chart of accounts? Does presenting them as a single `liability.current.vat_output` in Kontablo oversimplify?

Q13-BR: The SPED (Sistema Público de Escrituração Digital) requires transaction-level tax event data. Can Kontablo coexist with SPED compliance, or does the abstraction create compliance gaps?

**For DE:**
Q12-DE: The HGB (Handelsgesetzbuch) requires specific accounts for differences between HGB and IFRS (e.g., Rechnungsabgrenzungsposten for deferred items). How do these interact with Kontablo's proposed accounts?

Q13-DE: German SKREF or SKR03/SKR04 standard charts of accounts are widely used. Is mapping from SKR03 to Kontablo feasible in your opinion?

**For IN:**
Q12-IN: India's GST cascading system creates complex Input Tax Credit matching requirements. Does Kontablo's single `asset.current.vat_input` account adequately capture this complexity?

Q13-IN: What is your experience with Ind AS adoption? Where do companies struggle most in transitioning from Indian GAAP to Ind AS?

**For ZA:**
Q12-ZA: South Africa adopted IFRS for listed companies in 2005. In your experience, what are the remaining sticking points in IFRS application for SA entities?

Q13-ZA: How do small and non-listed companies (using GRAP or SA GAAP) differ from Kontablo's IFRS-anchored approach?

**For SA:**
Q12-SA: Zakat is a fundamental obligation for Saudi entities. Kontablo currently includes Zakat as a pending account (`liability.current.zakat`). How would you define the scope and calculation basis for a Zakat account in Kontablo?

Q13-SA: SOCPA has moved Saudi companies toward IFRS. In your experience, what are the most significant convergence gaps remaining?

### 3.4 Completeness Assessment (10 min)

Q14: On a scale of 1-10, how would you rate the completeness of the 30 Kontablo Level 3 core accounts for covering routine transactions in your jurisdiction?

Q15: What % of transactions in your typical client portfolio would map directly (1:1) to a Kontablo account without any customization?

Q16: What are the top 3 accounts that you believe are missing from the Kontablo core?

Q17: What are the top 3 industry extensions that would be most valuable for your clients?

### 3.5 Practical Adoption (5 min)

Q18: If Kontablo were available as an open standard today, would your firm/clients consider adopting it? What would the decision factors be?

Q19: What implementation barriers would your clients face in mapping their existing chart of accounts to Kontablo?

Q20: Any other feedback or suggestions?

