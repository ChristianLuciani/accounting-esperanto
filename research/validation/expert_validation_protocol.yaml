## SECTION 4: SCORING RUBRIC

### 4.1 Per-Account Confidence Score

| Score | Interpretation |
|-------|----------------|
| 5 | Fully agree — the proposed mapping is correct and complete |
| 4 | Mostly agree — minor clarification needed but fundamentally correct |
| 3 | Partially agree — the mapping is approximately right but needs adjustment |
| 2 | Mostly disagree — significant issues with the mapping |
| 1 | Strongly disagree — the mapping is incorrect or not applicable |

### 4.2 Aggregate Validation Thresholds

| Threshold | Decision |
|-----------|----------|
| Average confidence ≥ 4.0 across all accounts | Account mapping VALIDATED ✅ |
| Average confidence 3.0–3.9 | Account mapping NEEDS REVISION 🔄 |
| Average confidence < 3.0 | Account mapping REJECTED — redesign needed ❌ |

### 4.3 Completeness Score (Q14)

| Target | Status |
|--------|--------|
| ≥ 8.0 / 10 average across jurisdictions | Phase 0 COMPLETE — proceed to v0.3 |
| 6.0–7.9 | Add Level 3 accounts based on Q16 feedback |
| < 6.0 | Fundamental redesign needed |

