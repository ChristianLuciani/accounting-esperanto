## AGGREGATION RULES

aggregation_rules:

  total_current_assets:
    formula: "asset.current.cash + asset.current.bank + asset.current.receivables + asset.current.vat_input + asset.current.inventory + asset.current.prepaid"
    ifrs_tag: "ifrs-full:CurrentAssets"

  total_noncurrent_assets:
    formula: "asset.noncurrent.ppe + asset.noncurrent.rou_assets + asset.noncurrent.intangibles + asset.noncurrent.goodwill + asset.noncurrent.investments"
    ifrs_tag: "ifrs-full:NoncurrentAssets"

  total_assets:
    formula: "total_current_assets + total_noncurrent_assets"
    ifrs_tag: "ifrs-full:Assets"

  total_current_liabilities:
    formula: "liability.current.payables + liability.current.vat_output + liability.current.tax + liability.current.accrued + liability.current.short_term_debt"
    ifrs_tag: "ifrs-full:CurrentLiabilities"

  total_noncurrent_liabilities:
    formula: "liability.noncurrent.debt + liability.noncurrent.lease + liability.noncurrent.deferred_tax"
    ifrs_tag: "ifrs-full:NoncurrentLiabilities"

  total_equity:
    formula: "equity.capital + equity.retained + equity.reserves"
    ifrs_tag: "ifrs-full:Equity"

  working_capital:
    formula: "total_current_assets - total_current_liabilities"
    management_metric: true

  gross_profit:
    formula: "revenue.operating - expense.cogs"
    ifrs_tag: "ifrs-full:GrossProfit"

  ebitda:
    formula: "gross_profit - expense.admin + expense.depreciation"
    management_metric: true
    note: "Not an IFRS-defined metric, but universally used"

  ebit:
    formula: "gross_profit - expense.admin"
    management_metric: true

  ebt:
    formula: "ebit - expense.interest + revenue.other + expense.fx_loss"
    management_metric: true

  net_income:
    formula: "ebt - expense.tax"
    ifrs_tag: "ifrs-full:ProfitLoss"

---

## VALIDATION RULES

validation:

  balance_sheet_equation:
    rule: "total_assets == total_current_liabilities + total_noncurrent_liabilities + total_equity"
    error_message: "Balance sheet does not balance (A ≠ L+E)"
    severity: "ERROR"

  revenue_positive:
    rule: "revenue.operating >= 0"
    error_message: "Operating revenue cannot be negative (use contra-account)"
    severity: "WARNING"

  ppe_depreciation_check:
    rule: "asset.noncurrent.ppe > 0 IMPLIES expense.depreciation > 0"
    error_message: "PP&E exists but no depreciation recorded"
    severity: "WARNING"

  rou_assets_consistency:
    rule: "asset.noncurrent.rou_assets > 0 IMPLIES liability.noncurrent.lease > 0"
    error_message: "ROU Asset recorded but no corresponding lease liability"
    severity: "ERROR"

