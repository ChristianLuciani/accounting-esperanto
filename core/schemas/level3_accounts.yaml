# Kontablo Account Schema — Level 3 (Core)
# Version: 0.2.0
# Date: 2026-03-23
# Description: Definitive Level 3 account taxonomy for the Kontablo universal protocol
# Coverage: 20+ jurisdictions, IFRS-anchored, graph-compatible
# Status: Research Draft

metadata:
  version: "0.2.0"
  spec_date: "2026-03-23"
  ifrs_base: "2024"
  total_accounts: 30
  jurisdiction_coverage: 20
  graph_model: true
  uuid_format: "v4"
  notes: |
    Level 3 accounts are the core operational accounts used by SMEs and large companies
    across all jurisdictions. They are IFRS-anchored but include local adaptations
    via the localization overlay system.

