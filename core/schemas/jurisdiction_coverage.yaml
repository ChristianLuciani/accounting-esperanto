metadata:
  title: Kontablo Jurisdiction Coverage Manifest
  count: 195
  definition: 193 UN member states + 2 UN observer states (Holy See, State of Palestine)
  ifrs_status_source: IFRS Foundation, 'Who uses IFRS Accounting Standards?' jurisdiction profiles (https://www.ifrs.org/use-around-the-world/use-of-ifrs-standards-by-jurisdiction/)
  mapping_mode_basis: legal-tradition heuristic refined by named statutory chart families; code sets populated
    only where a primary source is cited (see chart_families.yaml)
  note: Universal coverage is via the IFRS-anchored layer (every Level-3 node has an ifrs_tag). statutory_chart
    jurisdictions additionally receive a local-code overlay.
  boundary_conditions:
  - B1. No fabricated codes. A jurisdiction is marked tier1_codes_available ONLY when a primary-source-cited
    code set exists (inline in level3_accounts.yaml or via a chart family in chart_families.yaml).
  - B2. Two distinct claims. mapping_mode='statutory_chart' is a CLASSIFICATION that a mandated national
    chart exists (legal-tradition heuristic + named family); tier1_codes_available is the stronger, VERIFIED
    claim that we hold cited codes. The two are reported separately; statutory_chart without codes means
    'chart exists, codes not yet transcribed', not 'covered by Tier 1'.
  - B3. IFRS-direct is a real coverage mode, not a gap. For the ~122 jurisdictions with no mandated national
    numeric chart (typically common-law), the honest and complete mapping basis is the IFRS tag carried
    by every Level-3 node; there is no local code to transcribe.
  - B4. Multi-state multipliers only where a chart is genuinely shared. SYSCOHADA (OHADA Uniform Act)
    is the one supranational chart shared verbatim by 17 states. The EU has NO shared chart (each member
    state has its own), so EU coverage is per-country, not a multiplier.
  - B5. Conservative classification. Where statehood applies IFRS directly without a mandated chart (e.g.,
    Chile, Uruguay, Costa Rica, Dominican Rep., Paraguay), the jurisdiction is left ifrs_direct rather
    than asserting a chart that does not exist.
  - B6. IFRS status provenance. ifrs_status derives from the IFRS Foundation jurisdiction profiles (169
    profiled); states without a profile are marked 'profile_na' rather than assumed.
