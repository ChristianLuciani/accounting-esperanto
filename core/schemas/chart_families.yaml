# Kontablo Statutory Chart Families
# Real, primary-source-cited code sets for supranational / shared statutory
# charts of accounts. A "family" maps Kontablo Level-3 node ids -> the local
# statutory code, and is shared by every jurisdiction assigned to that family in
# core/schemas/jurisdiction_coverage.yaml. This lets one verified chart cover
# many jurisdictions (e.g., SYSCOHADA covers the 17 OHADA member states).
#
# Only families with a citable primary source are populated here. Single-country
# charts (SAT-MX, PCG-FR, etc.) remain inline in level3_accounts.yaml.

metadata:
  version: "0.1.0"
  note: "codes are statutory account numbers; verify against each family's cited source."

families:

  SYSCOHADA:
    name: "Système Comptable OHADA (SYSCOHADA révisé)"
    members: [bj, bf, cm, cf, td, km, cg, cd, ci, gq, ga, gn, gw, ml, ne, sn, tg]
    source: "OHADA, Acte uniforme relatif au droit comptable et à l'information financière (AUDCIF), SYSCOHADA révisé, in force 2018; plan de comptes. https://www.ohada.org/"
    note: "PCG-derived 8-class chart, mandatory across all 17 OHADA member states."
    codes:
      asset.current.cash: "571"            # Caisse
      asset.current.bank: "521"            # Banques (comptes locaux)
      asset.current.receivables: "411"     # Clients
      asset.current.inventory: "31"        # Stocks de marchandises
      asset.current.vat_input: "4452"      # État, TVA récupérable sur achats
      asset.noncurrent.intangibles: "21"   # Immobilisations incorporelles
      asset.noncurrent.ppe: "22"           # Immobilisations corporelles (terrains/bâtiments)
      liability.current.payables: "401"    # Fournisseurs, dettes en compte
      liability.current.vat_output: "4431" # État, TVA facturée sur ventes
      liability.current.tax: "44"          # État et collectivités publiques
      liability.noncurrent.debt: "16"      # Emprunts et dettes assimilées
      equity.capital: "101"                # Capital social
      equity.reserves: "11"                # Réserves
      equity.retained: "12"                # Report à nouveau
      revenue.operating: "701"             # Ventes de marchandises
      revenue.other: "77"                  # Revenus financiers et assimilés
      expense.cogs: "601"                  # Achats de marchandises
      expense.admin: "62"                  # Services extérieurs
      expense.depreciation: "681"          # Dotations aux amortissements d'exploitation
      expense.interest: "671"              # Intérêts des emprunts
      expense.fx_loss: "676"               # Pertes de change
      expense.tax: "891"                   # Impôts sur le résultat

  PGC_ES:
    name: "Plan General de Contabilidad (Spain)"
    members: [es]
    source: "Spain, Real Decreto 1514/2007 (ICAC), Plan General de Contabilidad, cuadro de cuentas. https://www.plangeneralcontable.com/"
    codes:
      asset.current.cash: "570"            # Caja, euros
      asset.current.bank: "572"            # Bancos e instituciones de crédito c/c vista, euros
      asset.current.receivables: "430"     # Clientes
      asset.current.inventory: "300"       # Mercaderías
      asset.current.vat_input: "472"       # Hacienda Pública, IVA soportado
      asset.noncurrent.intangibles: "20"   # Inmovilizaciones intangibles
      asset.noncurrent.ppe: "21"           # Inmovilizaciones materiales
      liability.current.payables: "400"    # Proveedores
      liability.current.vat_output: "477"  # Hacienda Pública, IVA repercutido
      liability.current.tax: "475"         # Hacienda Pública, acreedora por conceptos fiscales
      liability.noncurrent.debt: "170"     # Deudas a largo plazo con entidades de crédito
      equity.capital: "100"                # Capital social
      equity.reserves: "112"               # Reserva legal
      equity.retained: "129"               # Resultado del ejercicio
      revenue.operating: "700"             # Ventas de mercaderías
      expense.cogs: "600"                  # Compras de mercaderías
      expense.admin: "62"                  # Servicios exteriores
      expense.depreciation: "681"          # Amortización del inmovilizado material
      expense.interest: "662"              # Intereses de deudas
      expense.fx_loss: "668"               # Diferencias negativas de cambio
      expense.tax: "630"                   # Impuesto sobre beneficios

  PCGE_PE:
    name: "Plan Contable General Empresarial (Peru)"
    members: [pe]
    source: "Peru, Ministerio de Economía y Finanzas (MEF), Plan Contable General Empresarial (PCGE modificado 2019). https://www.mef.gob.pe/contenidos/conta_publ/pcge/PCGE_2019.pdf"
    note: "PCGE is IFRS-converged; codes shown at element/sub-account level."
    codes:
      asset.current.cash: "101"            # Caja (elemento 10 Efectivo y equivalentes)
      asset.current.bank: "104"            # Cuentas corrientes en instituciones financieras
      asset.current.receivables: "12"      # Cuentas por cobrar comerciales - Terceros
      asset.current.inventory: "20"        # Mercaderías
      asset.noncurrent.ppe: "33"           # Inmuebles, maquinaria y equipo
      asset.noncurrent.intangibles: "34"   # Intangibles
      liability.current.payables: "42"     # Cuentas por pagar comerciales - Terceros
      liability.current.tax: "40"          # Tributos y aportes al sistema de pensiones por pagar
      equity.capital: "50"                 # Capital
      equity.reserves: "58"                # Reservas
      equity.retained: "59"                # Resultados acumulados
      revenue.operating: "70"              # Ventas
      expense.cogs: "69"                   # Costo de ventas
      expense.admin: "63"                  # Gastos de servicios prestados por terceros
      expense.depreciation: "68"           # Valuación y deterioro de activos (depreciación)
      expense.interest: "67"               # Gastos financieros

  SNC_PT:
    name: "Sistema de Normalização Contabilística (Portugal)"
    members: [pt]
    source: "Portugal, SNC — Código de Contas, Portaria n.º 218/2015 (CNC). https://www.cnc.min-financas.pt/"
    codes:
      asset.current.cash: "11"             # Caixa
      asset.current.bank: "12"             # Depósitos à ordem
      asset.current.receivables: "21"      # Clientes
      asset.current.inventory: "32"        # Mercadorias
      asset.current.vat_input: "2432"      # Estado - IVA dedutível
      asset.noncurrent.ppe: "43"           # Ativos fixos tangíveis
      asset.noncurrent.intangibles: "44"   # Ativos intangíveis
      liability.current.payables: "22"     # Fornecedores
      liability.current.vat_output: "2433" # Estado - IVA liquidado
      liability.current.tax: "24"          # Estado e outros entes públicos
      equity.capital: "51"                 # Capital realizado
      equity.reserves: "55"                # Reservas
      equity.retained: "56"                # Resultados transitados
      revenue.operating: "71"              # Vendas
      expense.cogs: "31"                   # Compras
      expense.admin: "62"                  # Fornecimentos e serviços externos
      expense.depreciation: "64"           # Gastos de depreciação e de amortização
      expense.interest: "691"              # Juros suportados
