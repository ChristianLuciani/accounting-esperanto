# Kontablo Localization Mapping: Kyrgyzstan (IFRS for PIEs / National Accounting Standards)
# Version: 0.1.0-draft
# Authority: Ministry of Finance of the Kyrgyz Republic
# Standard: IFRS for PIEs mandatory since 2013; National Accounting Standards for SMEs (NAS KR).
#   IFRS adoption: Law on Accounting No. 220 (2002, amended). Full IFRS for public companies.
# Critical Notes:
#   Currency: KGS (Kyrgyzstani Som).
#   VAT (НДС): 12% standard rate. Authority: State Tax Service of the Kyrgyz Republic.
#   Corporate income tax: 10% (flat rate — one of the lowest in CIS region).
#   Gold mining sector significant (Kumtor Gold Mine, operated by Centerra Gold until 2021
#   nationalization). State ownership of Kumtor via Kyrgyzaltyn.
#   Remittances from Russia are a major GDP component.
#   EAEU (Eurasian Economic Union) member — customs union reporting may affect trade accounts.

