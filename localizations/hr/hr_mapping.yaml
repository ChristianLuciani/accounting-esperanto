# Kontablo Localization Mapping: Croatia (ZOR + HSFI)
# Version: 0.1.0-draft
# Authority: HANFA (Croatian Financial Services Supervisory Agency) / MF (Ministarstvo financija)
# Standard: Zakon o računovodstvu (ZOR); HSFI (Hrvatski standardi financijskog izvještavanja)
# Critical Notes:
#   VAT (PDV): 25% standard; 13% reduced (accommodation, newspapers); 5% super-reduced (books, medicines)
#   Corporate income tax: 18% (revenue > 1M EUR); 10% (revenue ≤ 1M EUR)
#   Currency: EUR (adopted 1 January 2023; formerly HRK)
#   Mandatory chart of accounts (računski plan): classes 0-9
#   Class 0: Non-current assets; Class 1: Inventories; Class 2: Claims, investments, cash
#   Class 3: Short-term liabilities; Class 4: Operating expenses; Class 6: Revenues
#   Class 9: Cost accounting (internal)
#   VERIFY: 4-digit codes follow the RiF (Računski plan) published by RRIF; confirm with MF

