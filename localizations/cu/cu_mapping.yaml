# Kontablo Localization Mapping: Cuba (Cuban Accounting Standards — state-socialist)
# Version: 0.1.0-draft
# Authority: MTSS (Ministerio de Trabajo y Seguridad Social) / MEP (Ministerio de Economía
#   y Planificación) / Ministerio de Finanzas y Precios (MFP)
# Standard: Resolución 235/2005 del MFP and subsequent revisions. State-socialist accounting.
# Critical Notes:
#   VERIFY ALL ENTRIES — Cuba's accounting system reflects a state-socialist economy;
#   IFRS adoption is minimal and limited to joint ventures with foreign investors.
#   Currency: CUP (Peso Cubano). CUC (Peso Convertible) was abolished January 2021
#   in the "Tarea Ordenamiento" monetary unification; CUP is now the sole official currency.
#   USD is partially usable in specific state stores (MLC — Moneda Libremente Convertible
#   system) but not for general accounting. VERIFY current MLC account treatment.
#   Inflation has been significant post-2021 unification; IAS 29 hyperinflation criteria
#   may be applicable. VERIFY current inflation rate against IAS 29 threshold (100% over 3 years).
#   Private sector (trabajadores por cuenta propia / MPymes since 2021) is small but growing.
#   No formal VAT system; various taxes and contributions via MFP.
#   Corporate tax: Impuesto sobre Utilidades — 35% for joint ventures; rates for MPymes vary.
#   VERIFY — Cuban MFP publishes Gaceta Oficial; access from outside Cuba is limited.

