# Standard: NIIF adoptadas por ICPARD
# Critical Notes:
#   ITBIS (Impuesto a la Transferencia de Bienes Industrializados y Servicios) — VAT equivalent — 18%
#   ISR (Impuesto sobre la Renta) — corporate tax 27%
#   Currency: DOP (Dominican Peso); significant USD parallel usage in commercial transactions
#   Large informal sector; formal accounting primarily for regulated and listed entities
#   Fiscal year generally calendar year (Jan–Dec)

