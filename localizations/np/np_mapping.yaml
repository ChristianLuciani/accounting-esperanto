# Kontablo Localization Mapping: Nepal (NFRS)
# Version: 0.1.0-draft
# Authority: ICAN (Institute of Chartered Accountants of Nepal)
# Standard: NFRS (Nepal Financial Reporting Standards) — IFRS as adopted
# Critical Notes:
#   VAT: 13% standard rate
#   Corporate tax (CIT): 25% standard; 20% for manufacturing; 30% for banks/insurance
#   Currency: NPR (Nepalese Rupee) — pegged to INR at NPR 1.6 = INR 1
#   INR peg creates direct dependency on Indian monetary policy
#   Fiscal year: mid-July to mid-July (Nepali calendar BS — Bikram Sambat)
#   NFRS mandatory for listed companies and banks; SMEs may use NFRS for SMEs
#   VERIFY: NFRS version currently in force — ICAN has been updating standards
#   Hydropower and remittances dominate economy

