# Kontablo Localization Mapping: Kosovo (IFRS as adopted — Law No. 04/L-014)
# Version: 0.1.0-draft
# Authority: Kosovo Society of Certified Accountants and Auditors (SHKCA — Shoqata e Kontabilistëve dhe Auditorëve të Çertifikuar të Kosovës)
# Standard: IFRS as adopted under Law No. 04/L-014 on Accounting, Financial Reporting and Auditing
# Critical Notes:
#   TVSH (Tatimi mbi Vlerën e Shtuar — VAT) 18% standard rate; 8% reduced rate on certain goods
#   Corporate income tax (TAK — Tatimi i Ardhurave të Korporatave) 10%
#   Currency: EUR (unilateral euroization; not EU member)
#   Partially recognized state (recognized by ~100 UN member states as of 2026)
#   Uses EUR like Montenegro; no own central bank monetary policy
#   XK is not an official ISO 3166-1 code (Kosovo lacks UN membership); used by EU institutions and provisionally by financial systems

