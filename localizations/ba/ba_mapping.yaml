# Kontablo Localization Mapping: Bosnia and Herzegovina (FBiH + RS entity standards / IFRS)
# Version: 0.1.0-draft
# Authority: FBiH Ministry of Finance (Federacija BiH) / RS Ministry of Finance (Republika Srpska)
# Standard: Entity-level accounting laws; IFRS for larger entities in both FBiH and RS
# Critical Notes:
#   VAT (PDV): 17% single rate (nationwide, administered by Indirect Taxation Authority — UIO)
#   No reduced VAT rates in BiH (unique in the region)
#   Corporate income tax: 10% in both FBiH and RS
#   Currency: BAM (Konvertibilna marka), pegged to EUR at 1.95583 (same as DEM peg since 1995)
#   Dual entity structure: FBiH and RS each have separate accounting regulations
#   Both entities follow Yugoslav-influenced chart of accounts with classes 0-9
#   This mapping covers common-denominator accounts valid in both entities
#   VERIFY: Specific account codes vary between FBiH (Pravilnik FBiH) and RS (Pravilnik RS); confirm with entity MF

