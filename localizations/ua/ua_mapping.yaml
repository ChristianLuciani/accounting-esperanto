# Kontablo Localization Mapping: Ukraine (P(S)BO — National Accounting Standards /
#   План рахунків бухгалтерського обліку)
# Version: 0.1.0-draft
# Authority: Міністерство фінансів України (Ministry of Finance of Ukraine).
#            НБУ (Національний банк України / National Bank of Ukraine) for banks.
#            НКЦПФР (National Securities and Stock Market Commission) for listed entities.
# Standard: П(С)БО — Положення (стандарти) бухгалтерського обліку (National Accounting
#           Standards), per Law of Ukraine "On Accounting and Financial Reporting in Ukraine"
#           No. 996-XIV of July 16, 1999 (as amended).
#           Ukraine has a MANDATORY Plan of Accounts (План рахунків бухгалтерського обліку
#           підприємств), approved by Order of MoF No. 291 of November 30, 1999 (as amended).
#           IFRS is mandatory for: public-interest entities, banks, listed companies
#           (Law No. 996-XIV as amended by Law No. 2585-VIII of 2018).
# Critical Notes:
#   Ukraine has a MANDATORY chart of accounts with 9 classes, 2-digit class codes,
#   3-digit account codes. Codes below are official mandatory Ukrainian Plan of Accounts codes.
#   NOTE: Context of Russian invasion (February 24, 2022). Wartime legal/tax environment:
#     - Martial law suspended certain P(S)BO requirements; specific wartime accounting
#       rules apply (MoF Order No. 82 of March 18, 2022 and subsequent amendments).
#     - Destruction of assets: special write-off and loss recognition rules apply.
#     - UAH (hryvnia) has experienced significant depreciation; FX controls in place per NBU.
#     - Supply disruptions and business continuity issues affect inventory valuation.
#   VAT (ПДВ — Податок на додану вартість): 20% standard rate (Tax Code of Ukraine,
#     Section V). Reduced rate 7% for: medicine, healthcare services, books. Zero-rated: exports.
#   Corporate Income Tax (Податок на прибуток підприємств): 18% standard rate (Tax Code,
#     Section III). Financial sector: 25%. Wartime surcharges may apply — VERIFY.
#   Single Social Contribution (ЄСВ — Єдиний соціальний внесок): 22% employer rate on
#     gross salary (Law No. 2464-VI of July 8, 2010 as amended). During martial law:
#     minimum rate maintained even for suspended operations in certain cases.
#   PAYE: personal income tax 18% + military levy 1.5% (suspended during martial law for
#     some categories — VERIFY current status).
#   Currency: UAH (Ukrainian Hryvnia).
# VERIFY: All accounts confirmed from MoF Order No. 291/1999 as amended through 2021.
#         Wartime amendments (2022-2026) may have introduced temporary modifications;
#         confirm current applicable version with Ukrainian MoF or licensed Ukrainian auditor.
# VERIFY: Corporate income tax surcharge — draft legislation for wartime profit tax discussed;
#         confirm final applicable rate for fiscal year 2025/2026.
# VERIFY: Military levy — 1.5% on income confirmed; rate increase proposals discussed in 2024.

