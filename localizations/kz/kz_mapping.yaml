# Standard: IFRS (mandatory for public interest entities since 2005); KAS for SMEs
# Critical Notes:
#   VAT (ҚҚС — қосылған құн салығы): 12% standard (one of lowest globally); no reduced rates
#   Corporate income tax (КПН): 20% standard; 10% for agricultural producers
#   Currency: KZT (Kazakhstani Tenge)
#   KZT has experienced significant volatility (oil-linked economy)
#   Mandatory Plan of Accounts for budget organizations; IFRS-based for commercial entities
#   Commercial entity chart follows international groupings with 4-digit codes
#   IFRS adoption mandatory for: banks, insurance, pension funds, listed companies, large companies
#   VERIFY: Account codes below follow the Standard Plan of Accounts approved by MF RK Order 562/2007

