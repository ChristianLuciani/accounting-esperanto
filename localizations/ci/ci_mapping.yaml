# Kontablo Localization Mapping: Côte d'Ivoire (SYSCOHADA)
# Version: 0.1.0-draft
# Authority: Ordre des Experts Comptables de Côte d'Ivoire
# Standard: SYSCOHADA Révisé (2017)
# Critical Notes:
#   SYSCOHADA has a MANDATORY chart of accounts — classes 1-9
#   Class 1: Comptes de ressources durables; Class 2: Actifs immobilisés
#   Class 3: Actifs circulants (stocks); Class 4: Comptes de tiers
#   Class 5: Comptes de trésorerie; Class 6: Charges; Class 7: Produits
#   VAT (TVA): 18% standard rate
#   Corporate tax (IS — Impôt sur les Sociétés): 25%
#   Currency: XOF (West African CFA franc, pegged to EUR)
#   OHADA zone: 17 member states; SYSCOHADA mandatory for all

