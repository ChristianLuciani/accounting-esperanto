# Kontablo Localization Mapping: Liechtenstein (Swiss GAAP FER / PGR)
# Version: 0.1.0-draft
# Authority: Liechtensteinische Wirtschaftsprüfer-Kammer (LWK)
# Standard: Swiss GAAP FER (Fachempfehlungen zur Rechnungslegung) / PGR (Personen- und Gesellschaftsrecht)
# Critical Notes:
#   MWST (Mehrwertsteuer / VAT) 8.1% — same rate as Switzerland (Liechtenstein is within Swiss customs union)
#   Corporate income tax 12.5% (flat rate, one of the lowest in Europe)
#   Currency: CHF (Swiss franc — legal tender; Liechtenstein uses CHF, no own currency)
#   Financial centre: many holding companies, foundations (Stiftungen), and Anstalten
#   Swiss GAAP FER used by listed entities and larger companies; PGR minimum requirements apply to all
#   Close institutional alignment with Switzerland (customs union, monetary union, EEA member)

