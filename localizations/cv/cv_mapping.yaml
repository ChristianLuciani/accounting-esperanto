# Kontablo Localization Mapping: Cabo Verde / Cape Verde (SNCRF / IFRS-influenced)
# Version: 0.1.0-draft
# Authority: Ordem dos Contabilistas e Auditores de Cabo Verde (OCACV)
# Standard: SNCRF (Sistema de Normalização Contabilística e de Relato Financeiro) — introduced 2009
# Critical Notes:
#   VAT (IVA — Imposto sobre Valor Acrescentado): 15% standard rate
#   Corporate tax (IRPC — Imposto sobre o Rendimento das Pessoas Coletivas): 22%
#   Currency: Cape Verdean Escudo (CVE); pegged to EUR at CVE 110.265 = EUR 1
#   Portuguese-influenced standards; SNCRF aligns closely with IFRS/IAS principles
#   Small island developing state; tourism and remittances dominant
#   Account codes follow Portuguese PCG tradition (classes 1-8); class 1=Equity/Financing, 2=Fixed Assets,
#     3=Inventories, 4=Third-party accounts, 5=Financial, 6=Expenses, 7=Revenue, 8=Results

