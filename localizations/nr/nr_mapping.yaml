# Kontablo Localization Mapping: Nauru (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: Nauru Department of Finance
# Standard: IFRS as adopted (minimal formal framework)
# Critical Notes:
#   No formal income tax (historically financed by phosphate royalties)
#   No VAT
#   Currency: AUD (Australian dollar — legal tender)
#   NTF (Nauru Trust Fund) is a sovereign wealth fund; relevant for government entities
#   World's smallest island nation with dedicated accounting standards reference
#   Economy heavily dependent on offshore banking historically; now primarily Australian aid
#   Phosphate mining largely exhausted; economic rehabilitation ongoing

