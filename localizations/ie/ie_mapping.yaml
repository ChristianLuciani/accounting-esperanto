# Authority: IAASA (Irish Auditing and Accounting Supervisory Authority)
# Standard: IFRS (listed entities); FRS 102 (unlisted entities); Companies Act 2014
# Critical Notes:
#   VAT: 23% standard rate; 13.5% reduced; 9% hospitality/tourism
#   Corporate tax: 12.5% trading income (historic); 15% for large MNCs under Pillar Two (2024+)
#   Currency: EUR (member since 2002)
#   No mandatory uniform chart of accounts; structure follows UK/IFRS conventions
#   Financial year typically ends 31 December or aligned to trading year

