# Kontablo Localization Mapping: Switzerland (Swiss GAAP FER / OR)
# Version: 0.1.0-draft
# Authority: FER (Fachempfehlungen zur Rechnungslegung) / SER (Swiss GAAP FER);
#           Obligationenrecht (OR) art. 957-963b for statutory requirements
# Standard: Swiss GAAP FER (full) and Swiss GAAP FER for SMEs (Kern-FER);
#           OR-Rechnungslegung for micro and small entities
# Critical Notes:
#   Switzerland does not mandate a specific chart of accounts. The dominant practice follows
#   the Kontenrahmen KMU (SME chart, published by veb.ch/Swiss CPA Association) for SMEs
#   and the Kontenrahmen Käfer for larger entities. Codes below follow KMU practice.
#   Swiss GAAP FER is the principal Swiss-specific standard; listed SIX companies apply IFRS.
#   Switzerland is multilingual: accounts given in German (CH-DE) — the dominant business language —
#   with French (CH-FR) and English in comments where useful.
#   VAT (MWST/TVA/IVA): standard rate 8.1% (since 1 Jan 2024); reduced 2.6% (food, books,
#   medicines); special rate 3.8% (lodging). Switzerland is not in the EU VAT area.
#   Corporate income tax: federal rate 8.5% on profit (effective ~7.83%); total effective
#   rate including cantonal/communal taxes varies from ~12% (Zug, Nidwalden) to ~24% (Geneva).
#   CHF is the functional currency; EUR and USD accounts common in export-oriented entities.
#   Pillar Two global minimum tax (15%) applicable to large multinationals from 2024.

