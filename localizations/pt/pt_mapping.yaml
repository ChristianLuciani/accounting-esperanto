# Kontablo Localization Mapping: Portugal (SNC — Sistema de Normalização Contabilística)
# Version: 0.1.0-draft
# Authority: CNC (Comissão de Normalização Contabilística) / Decreto-Lei n.º 158/2009
# Standard: SNC (Sistema de Normalização Contabilística) — Portuguese GAAP
# Critical Notes:
#   SNC replaced the old POC (Plano Oficial de Contabilidade) in 2010. SNC is strongly
#   influenced by IFRS/IAS, adapted for the Portuguese legal and tax framework.
#   SNC has three levels: NCRF (full, 28 standards), NCRF-PE (simplified for SMEs),
#   NC-ME (micro-entities). Listed companies apply IFRS as adopted by EU.
#   SNC uses a 2-digit class system: 1=Meios Financeiros, 2=Contas a Receber/Pagar,
#   3=Inventários, 4=Investimentos, 5=Capital Próprio, 6=Gastos, 7=Rendimentos, 8=Results.
#   VAT (IVA — Imposto sobre o Valor Acrescentado): standard rate 23% (continental); 18%
#   (Madeira); 16% (Azores). Reduced rates: 13%/12%/10% and 6%/5%/4%.
#   Corporate income tax (IRC — Imposto sobre o Rendimento das Pessoas Coletivas): 21%
#   general rate (2024); reduced rate 17% on first €50k for SMEs.
#   AT (Autoridade Tributária e Aduaneira) supervises tax compliance.
#   SAF-T (Standard Audit File for Tax) is mandatory in Portugal since 2008.

