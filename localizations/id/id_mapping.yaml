# Kontablo Localization Mapping: Indonesia (PSAK — Pernyataan Standar Akuntansi Keuangan)
# Version: 0.1.0-draft
# Authority: IAI (Ikatan Akuntan Indonesia — Indonesian Institute of Accountants)
# Standard: PSAK (IFRS-converged), 2023 revision
# Critical Notes:
#   Indonesia adopted IFRS-converged PSAK progressively since 2012. The framework does NOT
#   mandate specific account codes; the numbering below reflects the widely-used de-facto
#   industry standard chart (Bagan Akun Standar / BAS) published by the Ministry of Finance
#   for state-owned enterprises (BUMN) and commonly adopted by private companies.
#   PPN (Pajak Pertambahan Nilai / VAT) rate: 11% (increased from 10% effective April 2022).
#   PPh (Pajak Penghasilan / Income Tax) rates vary by entity size.
#   PSAK 72 (Revenue Recognition, IFRS 15 equivalent) and PSAK 73 (Leases, IFRS 16 equivalent)
#   are effective. SMEs may use SAK EMKM (simplified standard).
# VERIFY: Account codes are BAS-inspired; private companies may use different numbering.

