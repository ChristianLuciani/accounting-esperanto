# Kontablo Localization Mapping: Bulgaria (НСС — Национални стандарти за финансови отчети)
# Version: 0.1.0-draft
# Authority: ICPA Bulgaria (Институт на дипломираните експерт-счетоводители)
# Standard: NAS (Национални счетоводни стандарти) for SMEs; IFRS for listed companies
# Critical Notes:
#   VAT (ДДС): 20% standard; 9% reduced (tourism, books, medicines from 2023)
#   Corporate income tax: 10% (one of lowest flat rates in EU)
#   Currency: BGN (Bulgarian Lev), pegged to EUR at 1.95583 BGN = 1 EUR
#   Currency board arrangement in place since 1997; EUR adoption planned post-2025
#   Mandatory chart of accounts: classes 1-9 (Soviet-influenced structure)
#   VERIFY: Specific account codes follow the Национален сметкоплан; confirm with ICPA

