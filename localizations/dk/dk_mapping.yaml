# Kontablo Localization Mapping: Denmark (Danish GAAP / ÅRL)
# Version: 0.1.0-draft
# Authority: Erhvervsstyrelsen (Danish Business Authority) / FSR — Danske Revisorer
# Standard: Danish Financial Statements Act (Årsregnskabsloven — ÅRL), consolidated 2015 with amendments
# Critical Notes:
#   Denmark does not mandate a specific chart of accounts. The ÅRL prescribes balance sheet
#   and income statement formats; the Standardkontoplan (standard chart) published by FSR and
#   supported by Dinero, e-conomic, and Billy is the de-facto SME reference.
#   ÅRL reporting classes: Class A (micro), B (small), C (medium), D (large).
#   Listed companies apply IFRS as adopted by EU (IAS Regulation).
#   VAT (Moms): standard rate 25% — one of the highest in the EU. No reduced rate except
#   zero rating (newspapers, exported goods, financial services).
#   Corporate income tax (Selskabsskat): 22% (since 2016).
#   Danish payroll contributions: ATP (labour market supplementary pension), AM-bidrag (labour
#   market contribution 8% of gross salary), and social contributions (AES, AUB, etc.).
#   Account codes follow e-conomic / Dinero default ranges most widely used by Danish SMEs.

