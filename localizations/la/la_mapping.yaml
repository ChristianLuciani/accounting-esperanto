# Kontablo Localization Mapping: Laos / Lao PDR (Lao Accounting Standards + IFRS in progress)
# Version: 0.1.0-draft
# Authority: Department of Accounting, Ministry of Finance (Lao PDR)
# Standard: Lao PDR Accounting Law (2013) + IFRS adoption in progress
# Critical Notes:
#   VAT: 10% standard rate
#   Corporate tax (CIT): 20% standard; 5% for qualifying agricultural/manufacturing sectors
#   Currency: LAK (Lao Kip) — significant depreciation pressure; THB and USD widely used
#   IFRS adoption is progressing but not yet fully mandated as of 2024
#   Lao accounting standards are influenced by French and Vietnamese traditions
#   VERIFY: current IFRS adoption status — large entities may be required to use IFRS
#   Natural resources (mining, hydropower) dominate; special sector rules apply
#   Lao script used; French and English also used in commercial contexts

