# Kontablo Localization Mapping: Guatemala (NIIF / PCG Guatemala)
# Version: 0.1.0-draft
# Authority: CCPAG (Colegio de Contadores Públicos y Auditores de Guatemala)
# Standard: NIIF adoptadas / PCG Guatemala
# Critical Notes:
#   IVA (Impuesto al Valor Agregado) 12% — one of the lowest VAT rates in Central America
#   ISR (Impuesto sobre la Renta) 25% on net profits (régimen sobre utilidades)
#   Alternative régimen: 7% on gross revenue (optional for small taxpayers)
#   Currency: GTQ (Quetzal)
#   SAT (Superintendencia de Administración Tributaria) is the tax authority
#   Fiscal year: January 1 – December 31

