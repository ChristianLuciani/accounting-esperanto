# Kontablo Localization Mapping: Algeria (Système Comptable Financier — SCF)
# Version: 0.1.0-draft
# Authority: CNC Algérie (Conseil National de la Comptabilité)
#            Source law: Loi n° 07-11 du 25 novembre 2007 portant système comptable financier.
#            Implementation decree: Décret exécutif n° 08-156 du 26 mai 2008.
# Standard: SCF (Système Comptable Financier), effective January 1, 2010.
#           Replaced the PCN (Plan Comptable National) of 1975.
#           SCF is substantially IFRS-aligned with a mandatory 7-class chart of accounts.
# Critical Notes:
#   Algeria has a MANDATORY chart of accounts (Plan des Comptes SCF).
#   Official structure: 7 classes with 2-digit root codes, 3-digit sub-accounts, up to 6 digits.
#   Class 1: Capital accounts. Class 2: Fixed assets. Class 3: Stocks.
#   Class 4: Third-party accounts. Class 5: Financial accounts.
#   Class 6: Expenses. Class 7: Revenue.
#   Arabic is the official language of the state (Constitution 2020, Art. 4).
#   All official accounting documents must be in Arabic; French is widely used in practice.
#   VAT (TVA — Taxe sur la Valeur Ajoutée): standard rate 19% (Loi de Finances 2017);
#     reduced rate 9% on certain goods/services. Source: Code des Taxes sur le Chiffre
#     d'Affaires (TCA), Articles 1-90.
#   Corporate Income Tax (IBS — Impôt sur les Bénéfices des Sociétés): 19% for
#     manufacturing/agriculture, 23% for construction/tourism, 26% for trade/services
#     (Loi de Finances 2015 rates; VERIFY for 2026).
#   TAP (Taxe sur l'Activité Professionnelle): 2% on turnover (local business activity tax).
#   Currency: DZD (Algerian Dinar).
# VERIFY: IBS rates — confirm applicable bands for fiscal year 2026 (subject to annual LF).
# VERIFY: TAP rate — 2% confirmed for most activities; verify 2026 LF amendments.
# VERIFY: Sub-account codes below 4 digits are author-generated consistent with SCF structure;
#         the mandatory 3-digit level is reproduced where officially published.

