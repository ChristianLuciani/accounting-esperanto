# Kontablo Localization Mapping: Paraguay (NIIF adopted / local standards)
# Version: 0.1.0-draft
# Authority: CCPY (Consejo de Contadores Públicos del Paraguay)
# Standard: NIIF adoptadas / Normas Contables Paraguayas (NCP)
# Critical Notes:
#   IVA (Impuesto al Valor Agregado) 10% — one of the lowest VAT rates in the world
#   Reduced IVA 5% on basic goods and some financial services
#   IRACIS (Impuesto a la Renta de las Actividades Comerciales, Industriales y de Servicios) 10%
#   Both IVA and IRACIS at 10% creates an unusually low total tax burden — a regional differentiator
#   IRP (Impuesto a la Renta Personal) for individuals — not covered here
#   Currency: PYG (Guaraní); large informal economy; Brazil (BRL) and Argentina (ARS) spillover
#   SET (Subsecretaría de Estado de Tributación) is the tax authority
#   Fiscal year: January 1 – December 31

