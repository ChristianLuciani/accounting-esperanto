# Kontablo Localization Mapping: Tajikistan (IFRS for PIEs / National Accounting Standards)
# Version: 0.1.0-draft
# Authority: Ministry of Finance of the Republic of Tajikistan
# Standard: IFRS for Public Interest Entities (PIEs); National Accounting Standards (NAS) for SMEs.
#   IFRS adoption for PIEs mandated; SMEs follow NAS which is IFRS-aligned but simplified.
#   Soviet-era chart of accounts (Plan schyotov) formally replaced but influence persists.
# Critical Notes:
#   Currency: TJS (Tajikistani Somoni).
#   VAT (НДС): 15% standard rate. Authority: Tax Committee under Government of Tajikistan.
#   Corporate income tax (Налог на прибыль): 18% standard rate.
#   Economy: hydropower, aluminium (TALCO), cotton, remittances from Russia/Kazakhstan.
#   TALCO (Tajik Aluminium Company) is dominant state enterprise; sector-specific accounts relevant.
#   Russian is widely used in business; Tajik (Cyrillic) is official.

