# Kontablo Localization Mapping: Uzbekistan (NAS / NSBU + IFRS in progress)
# Version: 0.1.0-draft
# Authority: Ministry of Finance of the Republic of Uzbekistan
# Standard: NAS (National Accounting Standards) / NSBU (Национальные стандарты бухгалтерского учёта)
# Critical Notes:
#   IFRS adoption is progressing: mandatory for banks and listed companies; in progress for others
#   VAT: 12% standard rate (reduced from 20% in 2019 tax reform)
#   Corporate tax (CIT): 15% standard rate (reformed 2019)
#   Currency: UZS (Uzbekistani Som)
#   Significant economic reforms since 2016 under President Mirziyoyev
#   NAS follows a chart-of-accounts structure influenced by Soviet-era accounting
#   VERIFY: exact NAS account codes — Uzbekistan uses a state-mandated chart

