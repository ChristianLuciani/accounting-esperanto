# Kontablo Localization Mapping: Turkmenistan (National Accounting Standards — Soviet-influenced)
# Version: 0.1.0-draft
# Authority: Ministry of Finance of Turkmenistan
# Standard: National Accounting Standards (NAS) — Soviet Plan Schyotov-derived; IFRS adoption minimal.
# Critical Notes:
#   VERIFY ALL ENTRIES — Turkmenistan is a closed, state-controlled economy with very limited
#   public financial transparency. Official accounting standards are not publicly available in
#   English. This mapping is based on available secondary sources and regional analogues.
#   Currency: TMT (Turkmenistani Manat; redenominated 2009, 1 TMT = 5000 old TMM).
#   VAT (НДС): 15% standard rate. VERIFY — rate and administration opacity.
#   Corporate income tax: 8% (one of the lowest globally). VERIFY — preferential rates for
#   gas sector likely differ; state enterprise treatment opaque.
#   Economy: natural gas (dominant; ~70% of export revenues via state-owned Turkmengaz),
#   cotton, state-controlled trade. Private sector extremely limited.
#   IFRS adoption status: formally committed in principle but implementation not verifiable.
#   Sources: IMF Article IV consultations (limited); ADB assessments; World Bank reports.

