# Kontablo Localization Mapping: Somalia (Minimal formal standards / IFRS aspiration)
# Version: 0.1.0-draft
# Authority: No functioning national accounting authority; Central Bank of Somalia (CBS) has limited oversight
# Standard: No enacted national standard; IFRS aspirational for formal sector
# Critical Notes:
#   VERIFY: All entries — Somalia has no functioning formal accounting standards body
#   VERIFY: VAT system not operational nationally; some indirect taxes may apply in Mogadishu
#   VERIFY: Corporate tax rate — approximate 15-30% reportedly applied; enforcement minimal
#   Currency: Somali Shilling (SOS); USD is the de-facto transaction currency in most formal commerce
#   Somaliland (self-declared republic, unrecognized) uses Somaliland Shilling separately
#   Puntland and Jubaland have semi-autonomous administrations with separate revenue collection
#   Islamic finance norms apply; interest-based accounts are uncommon in formal banking
#   Hawala (xawilaad) money transfer system dominant for remittances
#   Use this mapping only for NGO/UN/formal-sector entities operating under ad-hoc IFRS frameworks

