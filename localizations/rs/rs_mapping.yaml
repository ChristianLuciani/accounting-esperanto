# Kontablo Localization Mapping: Serbia (МРС/МСФИ — Serbian Accounting Law)
# Version: 0.1.0-draft
# Authority: Ministry of Finance of Serbia (Министарство финансија Републике Србије)
# Standard: Law on Accounting (Zakon o računovodstvu); IFRS/IAS adopted; MRS for SMEs
# Critical Notes:
#   VAT (PDV): 20% standard; 10% reduced (food, utilities, medicines, tourism)
#   Corporate income tax: 15%
#   Currency: RSD (Serbian Dinar)
#   Mandatory chart of accounts: classes 0-9 (Yugoslav-influenced structure)
#   Class 0: Non-current assets; Class 1-2: Inventories and current assets
#   Class 3: Capital accounts; Class 4: Costs by nature; Class 5: Cost of sales
#   Class 6: Revenues; Class 7: Expenses; Class 8: Financial result; Class 9: Internal
#   VERIFY: 3-digit codes follow the Pravilnik o Kontnom Okviru (Kontni Okvir 2013 amendments)

