# Kontablo Localization Mapping: Bhutan (Bhutan Accounting Standards — IFRS-aligned)
# Version: 0.1.0-draft
# Authority: Royal Institute of Chartered Accountants of Bhutan (RICAB) / Ministry of Finance
# Standard: Bhutan Accounting Standards (BAS) — IFRS-aligned since 2013 adoption.
#   BAS issued by the Ministry of Finance; largely mirrors IFRS with Bhutan-specific adaptations.
# Critical Notes:
#   Currency: BTN (Bhutanese Ngultrum), pegged 1:1 to INR. INR is also legal tender in Bhutan.
#   Both BTN and INR may appear in accounts; IAS 21 does not strictly apply between them
#   due to peg, but separate tracking recommended for INR/BTN liquidity.
#   Sales Tax (ST): multiple rates (0%, 5%, 10%, 25%, 100% for luxury/tobacco/alcohol).
#   VERIFY current rate schedule — Bhutan Revenue and Customs administers.
#   Corporate income tax (CIT): 30% standard rate for companies.
#   GNH (Gross National Happiness) policy may affect certain reporting disclosures.
#   Hydropower is the dominant export revenue stream; DGPC (Druk Green Power Corporation)
#   accounts for significant state enterprise activity.
#   Rupee-Ngultrum peg managed by Royal Monetary Authority (RMA).

