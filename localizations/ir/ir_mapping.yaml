# Kontablo Localization Mapping: Iran (INAS — Iranian National Accounting Standards)
# Version: 0.1.0-draft
# Authority: IACPA (Iranian Association of Certified Public Accountants) / Audit Organization of Iran
# Standard: INAS (استانداردهای حسابداری ملی ایران) — Iranian National Accounting Standards
# Critical Notes:
#   VAT (مالیات بر ارزش افزوده): 10% standard rate
#   Corporate tax (مالیات بر درآمد اشخاص حقوقی): 25% standard
#   Currency: IRR (Iranian Rial) OR IRT (Toman — 1 Toman = 10 Rials)
#   Toman is the de-facto unit in commerce; Rial is the official unit
#   SANCTIONS: Iran faces comprehensive US and EU sanctions; significant impact on:
#     - International banking and correspondent relationships
#     - Cross-border transactions and FX conversion
#     - Access to SWIFT and international payment systems
#   IFRS adoption: INAS is broadly IFRS-influenced but maintains Iran-specific standards;
#   full IFRS not formally adopted due to sanctions and political factors
#   Audit Organization of Iran (AOI) issues standards; listed companies must follow INAS
#   VERIFY: current VAT rate — was increased to 10% in 2023 budget; may have changed

