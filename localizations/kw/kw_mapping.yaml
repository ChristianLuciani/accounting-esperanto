# Kontablo Localization Mapping: Kuwait (IFRS as adopted — KICPAA / Ministry of Commerce)
# Version: 0.1.0-draft
# Authority: KICPAA (Kuwait Association of Accountants and Auditors) issues pronouncements.
#            Ministry of Commerce and Industry (MOCI) under Companies Law No. 1/2016.
#            Central Bank of Kuwait (CBK) for financial institutions.
#            Capital Markets Authority (CMA) for listed companies.
# Standard: IFRS as adopted. Kuwait has committed to IFRS for PIEs and listed companies.
#           No single formal adoption proclamation; IFRS adoption is de facto standard
#           per CMA requirements and CBK circulars for regulated entities.
# Critical Notes:
#   No mandatory national chart of accounts.
#   Codes below follow common practice in Kuwait consistent with KICPAA and Big-4 practice.
#   NO VAT in Kuwait as of 2026. Kuwait has repeatedly delayed GCC VAT implementation.
#     (GCC VAT Agreement 2017; Saudi Arabia and UAE implemented 2018; Kuwait has not.)
#   NO Corporate Income Tax on Kuwaiti nationals and GCC citizens.
#   Corporate Tax: 15% ONLY on foreign companies' share of profits (Decree Law No. 3 of 1955
#     as amended by Law No. 2 of 2008). Rate applies to net taxable profit of foreign entities.
#   Zakat: obligatory for Kuwaiti Muslim shareholders — 1% of net profit per Law No. 46 of 2006
#     (Zakat Law). Zakat is computed separately from corporate tax and paid directly by
#     shareholders; company may facilitate through equity distribution not expense line.
#     VERIFY: whether entity-level Zakat booking is required per local practice.
#   National Labour Support Tax (NLST): 2.5% of net profit of Kuwaiti listed companies
#     (Law No. 19 of 2000). Applicable to publicly traded Kuwaiti companies only.
#   Kuwait Foundation for the Advancement of Sciences (KFAS): 1% of net profit of
#     Kuwaiti shareholding companies (Law No. 6 of 1984 as amended).
#   PIFSS (Public Institution for Social Security): employer 11.5%, employee 8%
#     for Kuwaiti nationals (Law No. 61 of 1976 as amended by Law No. 22 of 2020).
#     Expatriates: not covered by PIFSS; employers pay EOSB (End of Service Benefit).
#   Islamic Finance: Kuwait Finance House (KFH), Boubyan Bank, Gulf Bank Islamic windows.
#     AAOIFI standards are reference for Islamic accounting in Kuwait.
#     Key Islamic instruments: Murabaha, Musharakah, Ijara, Istisna'a, Sukuk Al-Ijara.
#   Currency: KWD (Kuwaiti Dinar). Pegged to basket of currencies; among highest-valued
#     currencies globally (~3.30 USD per KWD).
# VERIFY: Foreign company tax rate — 15% confirmed under Law 2/2008; petroleum sector has
#         separate arrangements under concession agreements (not public).
# VERIFY: NLST — 2.5% confirmed under Law 19/2000; applies to Kuwaiti listed companies only.
# VERIFY: KFAS — 1% confirmed under Law 6/1984 as amended; confirm 2026 applicability.
# VERIFY: Zakat — 1% per Law 46/2006; accounting treatment (equity vs expense) varies;
#         confirm current Ministry of Awqaf guidance.

