# Kontablo Localization Mapping: Estonia (Estonian Accounting Act / IFRS)
# Version: 0.1.0-draft
# Authority: Raamatupidamise Toimkond (RTK — Accounting Standards Board of Estonia)
# Standard: Raamatupidamise seadus (Accounting Act) + EAA (Estonian Accounting Standards)
#            / IFRS for listed companies
# Critical Notes:
#   - Estonia has a UNIQUE corporate tax model: CIT applies ONLY on profit distributions,
#     not on retained/reinvested profits. Undistributed profits are tax-free.
#     Rate: 20% on gross distribution (= 20/80 = 25% on net profit distributed).
#     This is the "Estonian model" also adopted by Georgia (GE) and Latvia (LV).
#   - VAT (käibemaks): standard rate 22% (increased from 20% in 2024).
#     Reduced rates: 9% (books, accommodation, press) and 5% (press from 2025).
#   - Social Tax (sotsiaalmaks): 33% employer contribution on gross salary.
#   - Unemployment insurance: 0.8% employer + 1.6% employee.
#   - Estonian GAAP (EAA standards) is IFRS-aligned; listed companies use EU-endorsed IFRS.
#   - No mandatory chart of accounts — companies choose their own structure.
#   - Estonia is notable as a founding member of the EU with a digital-first government.
#   - e-Residency program relevant for international companies using Estonian entities.
#   - Member of Eurozone (EUR since 2011).

