# Kontablo Localization Mapping: Latvia (Gada pārskatu un konsolidēto gada pārskatu likums)
# Version: 0.1.0-draft
# Authority: LR MF (Latvijas Republikas Finanšu ministrija — Ministry of Finance of Latvia)
# Standard: Annual Reports and Consolidated Annual Reports Law (2016); IFRS for listed entities
# Critical Notes:
#   VAT (PVN): 21% standard; 12% reduced (medicines, medical devices, press); 0% for exports
#   Corporate income tax: 20% (on distributed profits only — unique "distributed profit tax" model since 2018)
#   Undistributed profits not taxed until distributed; effective rate depends on dividend policy
#   Currency: EUR (member since 2014)
#   No mandatory uniform chart; account structure classes 1-9 are widely followed in practice
#   VERIFY: Account codes below follow common Latvian practice; confirm with LR MF guidance

