# Kontablo Localization Mapping: North Macedonia (МСС/МСФИ — Macedonian Accounting Standards / IFRS)
# Version: 0.1.0-draft
# Authority: Institute of Certified Auditors of North Macedonia (Институт на овластени ревизори)
# Standard: Macedonian Accounting Standards (МСС); IFRS for listed and public interest entities
# Critical Notes:
#   VAT (ДДВ — данок на додадена вредност): 18% standard; 5% reduced (food, medicines, agricultural inputs)
#   Corporate income tax: 10% (flat rate)
#   Currency: MKD (Macedonian Denar), pegged to EUR
#   Mandatory chart of accounts: classes 0-9, Yugoslav-influenced structure
#   Class 0: Non-current assets; Class 1: Inventories; Class 2: Cash and receivables
#   Class 3: Capital; Class 4: Costs; Class 5: Cost of sales; Class 6: Revenue; Class 7: Expenses
#   VERIFY: Codes follow the Сметковниот план (Smetkovniot plan) prescribed by Ministry of Finance MK

