# Kontablo Localization Mapping: Jamaica (IFRS adopted)
# Version: 0.1.0-draft
# Authority: ICAJ (Institute of Chartered Accountants of Jamaica)
# Standard: IFRS as adopted by ICAJ
# Critical Notes:
#   GCT (General Consumption Tax) 15% — VAT equivalent; some zero-rated and exempt supplies
#   Corporate income tax: 25% for listed companies; 33.33% (1/3) for non-listed companies
#   Minimum Business Tax (MBT) applies to entities below income tax threshold
#   Currency: JMD (Jamaican Dollar); significant USD usage in tourism and export sectors
#   TAJ (Tax Administration Jamaica) is the revenue authority
#   Fiscal year: April 1 – March 31 for government; calendar year common for private sector

