# Kontablo Localization Mapping: Cyprus (IFRS as adopted by EU)
# Version: 0.1.0-draft
# Authority: ICPAC (Institute of Certified Public Accountants of Cyprus)
# Standard: IFRS as adopted by EU (mandatory for all companies); Companies Law Cap. 113
# Critical Notes:
#   VAT (ΦΠΑ): 19% standard; 9% reduced (restaurants, accommodation, passenger transport); 5% super-reduced
#   Corporate income tax: 12.5% (one of lowest in EU)
#   IP Box regime: 2.5% on qualifying IP income
#   Currency: EUR (member since 2008)
#   No mandatory uniform chart; IFRS structure followed; UK accounting influence historically
#   Special Defence Contribution (SDC) applies to passive income for Cyprus tax residents
#   VERIFY: Account codes below follow common IFRS practice in Cyprus; no mandatory nacional plan

