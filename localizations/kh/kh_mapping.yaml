# Kontablo Localization Mapping: Cambodia (CIFRS)
# Version: 0.1.0-draft
# Authority: KICPAA (Kampuchea Institute of Certified Public Accountants and Auditors)
# Standard: CIFRS (Cambodian International Financial Reporting Standards) — IFRS as adopted
# Critical Notes:
#   VAT: 10% standard rate
#   Corporate tax (ToP — Tax on Profit): 20% standard; 5% for QIP (Qualified Investment Project)
#   Currency: KHR (Cambodian Riel) — USD is WIDELY USED as de-facto parallel currency
#   Dual-currency environment: most business transactions in USD; KHR used for retail
#   Financial statements may be prepared in USD by entities using USD as functional currency
#   Minimum tax: 1% of annual turnover (applicable when ToP would be lower)
#   CIFRS adopted in stages since 2009; full IFRS alignment ongoing

