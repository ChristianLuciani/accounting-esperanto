# Kontablo Localization Mapping: South Korea (K-GAAP / K-IFRS)
# Version: 0.1.0-draft
# Authority: FSC (Financial Services Commission) / KASB (Korea Accounting Standards Board)
# Standard: K-GAAP (일반기업회계기준) / K-IFRS (한국채택국제회계기준), 2023
# Critical Notes:
#   Korea maintains two parallel standards: K-IFRS (mandatory for listed companies and financial
#   institutions, converged with IFRS) and K-GAAP (for non-listed companies). The numeric codes
#   below follow the traditional 3-digit classification widely used in Korean practice under
#   the former "기업회계기준" and its successor K-GAAP. K-IFRS does not mandate specific codes;
#   the codes here represent the de-facto industry standard chart used by Korean SMEs and are
#   consistent with the Korean Standard Chart of Accounts (표준계정과목) published by the KICPA.
#   VAT (부가가치세, VAT rate 10%) is administered by NTS (National Tax Service).
# VERIFY: K-IFRS-only entities may use different internal numbering; codes here are K-GAAP-aligned.

