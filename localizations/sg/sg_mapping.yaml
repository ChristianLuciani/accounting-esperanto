# Kontablo Localization Mapping: Singapore (SFRS — Singapore Financial Reporting Standards)
# Version: 0.1.0-draft
# Authority: ACRA (Accounting and Corporate Regulatory Authority) / ASC (Accounting Standards Council)
# Standard: SFRS(I) (Singapore Financial Reporting Standards International) — identical to IFRS
#            as issued by IASB, adopted without modification for Sing. listed companies since 2018.
#            SFRS for Small Entities (SFRS for SE) for eligible non-listed entities.
# Critical Notes:
#   Singapore has NO mandatory chart of accounts. ACRA/ASC do not prescribe specific account
#   codes. The codes below reflect the most common numbering convention used by Singapore-based
#   accounting firms and SMEs, consistent with ICPAS (now ISCA — Institute of Singapore
#   Chartered Accountants) guidance.
#   GST (Goods and Services Tax): rate increased to 9% effective 1 January 2024 (from 8% in 2023,
#   from 7% prior). Only entities with taxable turnover > SGD 1 million must register for GST.
#   Corporate income tax: 17% headline rate; effective rates lower due to partial tax exemptions
#   (75% of first SGD 10,000 and 50% of next SGD 190,000 exempt for companies).
#   CPF (Central Provident Fund): employer contribution rate up to 17% of wages, mandatory for
#   Singapore citizens and PRs. Creates significant payroll liability accounts.
# VERIFY: Codes are industry-standard approximations; ACRA does not mandate a chart of accounts.

