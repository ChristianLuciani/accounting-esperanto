# Kontablo Localization Mapping: Tanzania (TFRS — Tanzania Financial Reporting Standards)
# Version: 0.1.0-draft
# Authority: NBAA (National Board of Accountants and Auditors of Tanzania), established by
#            Auditors and Accountants (Registration) Act, Cap. 286 R.E. 2002.
#            TRA (Tanzania Revenue Authority) for tax compliance.
#            CMSA (Capital Markets and Securities Authority) for listed entities.
# Standard: TFRS (Tanzania Financial Reporting Standards) = IFRS as adopted by NBAA.
#           Full IFRS for Tier 1 entities (listed, banks, insurance, large SOEs).
#           IFRS for SMEs for Tier 2. Financial Reporting (No. 2) Act 2018 governs.
# Critical Notes:
#   No mandatory national chart of accounts for private-sector entities.
#   Codes below follow common practice consistent with NBAA guidance.
#   Tanzania mainland and Zanzibar have separate tax administrations (ZRB for Zanzibar).
#   VAT: 18% standard rate (Value Added Tax Act Cap. 148 R.E. 2019, as amended).
#     Zero-rated: exports, agricultural inputs (TRA guidelines).
#     Exempt: financial services, unprocessed foodstuffs, medical services.
#   Corporate Income Tax (CIT): 30% standard rate (Income Tax Act 2004, Cap. 332 R.E. 2019).
#     Manufacturing sector: 25% for first 5 years on investments > USD 50M (VERIFY).
#     New exploration companies: additional profits tax applies.
#   Skills Development Levy (SDL): 4% of gross salaries (SDL Act Cap. 246).
#   NSSF (National Social Security Fund): employer 10%, employee 10% of gross salary.
#   Workers Compensation Fund (WCF): employer contribution rate varies by risk class.
#   Currency: TZS (Tanzanian Shilling).
#   Note: Tanzania Mainland uses Tanzanian Shilling; Zanzibar uses same but ZRB administers tax.
# VERIFY: CIT rate — 30% confirmed as standard; manufacturing incentive rates vary by investment
#         agreement; confirm for 2026.
# VERIFY: NSSF rate — 10%+10% confirmed; verify whether PSSSF (public sector) rates apply.
# VERIFY: SDL rate — 4% confirmed per SDL Act; verify no 2026 amendment.

