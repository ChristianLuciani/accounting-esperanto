# Kontablo Localization Mapping: Taiwan (TIFRS / Taiwan-IFRSs)
# Version: 0.1.0-draft
# Authority: FSC (Financial Supervisory Commission) / ARDF (Accounting Research and Development Foundation)
# Standard: TIFRS (Taiwan International Financial Reporting Standards), effective 2013 for listed companies
# Critical Notes:
#   - Currency: TWD (New Taiwan Dollar)
#   - Business Tax (VAT): 5% uniform rate (one of lowest in Asia)
#   - Corporate Income Tax: 20%
#   - Undistributed Earnings Surtax: 5% on retained earnings not distributed within 2 years
#   - Chart of accounts class structure: 1=Assets, 2=Liabilities, 3=Equity, 4=Revenue,
#     5=Cost of Sales, 6=Operating Expenses, 7=Non-operating, 8=Income Tax, 9=Memoranda
#   - Mandatory payroll: Labor Pension (勞工退休金) 6% employer contribution; Labor Insurance (勞工保險)
#   - Account names in Traditional Chinese; Taiwan uses ISO 3166-1 alpha-2 TW (not a UN member)
#   - Non-listed companies may use SFAS or Taiwan-IFRS for SMEs instead of TIFRS

