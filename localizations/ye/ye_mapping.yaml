# Kontablo Localization Mapping: Yemen (IFRS adoption minimal / local standards — conflict-disrupted)
# Version: 0.1.0-draft
# Authority: Yemeni Association of Certified Public Accountants (YACPA)
#   Note: YACPA operates under significant constraint; dual-authority context (recognized
#   Government of Yemen / Aden vs Houthi movement / Sanaa) affects all formal institutions.
# Standard: Yemen had adopted IFRS in principle for listed entities; implementation minimal.
#   Local accounting standards (based on pre-2015 framework) used in practice.
# Critical Notes:
#   VERIFY ALL ENTRIES — Yemen is in active civil war (2014/15–present). Dual-authority
#   economic structure creates two parallel fiscal systems (GoY in Aden/south and Houthi
#   in Sanaa/north). Formal accounting infrastructure severely disrupted.
#   Currency: YER (Yemeni Rial). Dual-authority context has led to separate monetary
#   policies; the official exchange rate diverges significantly between north and south.
#   IAS 29 hyperinflation criteria met — cumulative inflation exceeds 100% over 3 years.
#   USD widely used for trade and savings; SAR (Saudi Riyal) used in border areas.
#   Corporate income tax: pre-war rate was approximately 20%. Current enforcement
#   depends on which authority controls the entity's location. VERIFY.
#   Sales/VAT: General Sales Tax was approximately 5% pre-war under Ministry of Finance.
#   Current tax administration status uncertain. VERIFY.
#   This mapping reflects the pre-2015 legal framework as a historical baseline.
#   Do NOT use for active compliance without jurisdiction-specific legal advice.
#   Sources: IMF Yemen reports (last pre-2015); World Bank Yemen Economic Monitor;
#   YACPA documentation (pre-war).

