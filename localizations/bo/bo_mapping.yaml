# Kontablo Localization Mapping: Bolivia (PGC Bolivia / NIIF)
# Version: 0.1.0-draft
# Authority: CTNC (Consejo Técnico Nacional de Auditoría y Contabilidad)
# Standard: PGC Bolivia / NIIF adoptadas
# Critical Notes:
#   IVA (VAT) 13% — flat rate, included in price (régimen integrado)
#   IUE (Impuesto a las Utilidades de las Empresas) 25% corporate tax
#   IT (Impuesto a las Transacciones) 3% — gross-revenue transaction tax, credits against IUE
#   Mandatory 4-digit chart influenced by PCGE structure
#   Currency: BOB (Boliviano); dual-currency reporting sometimes in USD for large corps
#   NIIF full adoption mandated for regulated entities; NIIF PYME for SMEs

