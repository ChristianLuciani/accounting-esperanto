# Kontablo Localization Mapping: Botswana (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: BICA (Botswana Institute of Chartered Accountants)
# Standard: IFRS as adopted per Companies Act (Cap 42:01) and BICA regulations
# Critical Notes:
#   - Botswana adopts IFRS in full; no mandatory national chart of accounts.
#   - Currency: BWP (Botswana Pula). Managed float against a basket (SDR + ZAR).
#   - VAT (Value Added Tax): 14% standard rate.
#   - Corporate Income Tax (CIT): 22% standard; 15% for Manufacturing companies.
#   - Withholding Tax: dividends 7.5%; interest 15%; management fees 15%.
#   - Economy dominated by diamonds (Debswana — De Beers / GoB JV) and mining sector.
#   - BURS (Botswana Unified Revenue Service) administers tax.
#   - Botswana is an upper-middle-income country and one of Africa's most stable economies.
#   - No mandatory chart of accounts; codes follow common IFRS practice.

