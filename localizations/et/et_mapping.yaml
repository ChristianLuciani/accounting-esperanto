# Kontablo Localization Mapping: Ethiopia (IFRS as adopted — Proclamation 847/2014)
# Version: 0.1.0-draft
# Authority: AABE (Accounting and Auditing Board of Ethiopia), established by
#            Proclamation No. 847/2014. AABE oversees financial reporting for public interest
#            entities. NBE (National Bank of Ethiopia) for financial institutions.
# Standard: IFRS adopted as national standard per Proclamation 847/2014, effective for
#           financial years beginning on or after July 8, 2014 (Ethiopian fiscal year:
#           Hamle 1 = July 8/9). Full IFRS for Tier 1 entities (PIEs); IFRS for SMEs for Tier 2.
#           Amharic is the official language; English is used in business.
# Critical Notes:
#   No mandatory national chart of accounts; codes reflect common practice consistent with
#   AABE guidelines and Ethiopian CPA Institute (ICPAE) materials.
#   VAT: 15% standard rate (Value Added Tax Proclamation No. 285/2002, amended).
#     Registration threshold: ETB 500,000 annual turnover (VERIFY for 2026 — has been revised).
#     Exempt: exports, financial services, medical services, educational services.
#   Business Profit Tax (Corporate Income Tax): 30% standard rate (Income Tax Proclamation
#     No. 979/2016). Withholding tax on dividends: 10%. On interest: 5%.
#   Employment Income Tax: progressive 0-35% (Proclamation 979/2016 Schedule A).
#   Pension: mandatory for private sector since Proclamation 715/2011:
#     employer 11%, employee 7% of gross salary.
#   Currency: ETB (Ethiopian Birr). Managed exchange rate; recent significant devaluations
#     (July 2024: unified FX market introduced). FX revaluation is material.
#   Ethiopian fiscal year: July 8 – July 7 (Gregorian), or Hamle 1 – Sene 30 (Ethiopian calendar).
#     Financial statements commonly prepared on Gregorian calendar year by multinationals.
# VERIFY: VAT registration threshold — was ETB 500,000; Proclamation 285/2002 amended multiple
#         times; confirm current threshold.
# VERIFY: Business profit tax rate — 30% confirmed per Proclamation 979/2016; confirm no change.
# VERIFY: Pension rates — private sector rates confirmed; public sector has separate system.

