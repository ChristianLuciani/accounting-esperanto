# Kontablo Localization Mapping: Maldives (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: CPA Maldives (Institute of Chartered Accountants of the Maldives — ICAM)
# Standard: IFRS as adopted by the Maldives (mandatory for all companies since 2011 Companies Act).
# Critical Notes:
#   Currency: MVR (Maldivian Rufiyaa).
#   GST: General Goods and Services Tax — 6% general rate; 16% tourism sector rate.
#   VERIFY — Tourism GST (TGST) 16% applies to tourist-oriented services; general GST 6%.
#   Corporate income tax (BPT — Business Profit Tax): 15% standard rate (introduced 2011).
#   Economy: tourism (~50% of GDP and ~60% of forex earnings), fisheries.
#   Resort lease accounts: government-owned islands leased to resort developers;
#   lease rent treatment under IFRS 16 critical for the sector.
#   Green Tax: USD 6 per tourist per night (VERIFY current rate) — environmental levy
#   recorded as a government levy payable, not income.
#   USD widely used alongside MVR in tourism sector.

