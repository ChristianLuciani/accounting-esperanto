# Authority: Ministry of Finance of the Republic of Moldova (Ministerul Finanțelor)
# Standard: SNC Moldova (National Accounting Standards, Law 287/2017); IFRS for public interest entities
# Critical Notes:
#   VAT: 20% standard; 8% reduced (bread, milk, medicines, gas); 0% for exports
#   Corporate income tax: 12%
#   Currency: MDL (Moldovan Leu)
#   Mandatory chart of accounts: General Plan of Accounts (Plan general de conturi) approved by MF
#   Structure: classes 1-9 with 3-4 digit account codes
#   Class 1: Long-term assets; Class 2: Current assets; Class 3: Equity; Class 4: Long-term liabilities
#   Class 5: Current liabilities; Class 6: Revenue; Class 7: Expenses; Class 8: Management accounts
#   VERIFY: Codes follow the Plan general de conturi approved by MF Order 119/2013 (amended)

