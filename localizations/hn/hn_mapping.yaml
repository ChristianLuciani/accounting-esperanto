# Authority: CCPA Honduras (Colegio de Contadores Públicos de Honduras)
# Standard: NIIF adoptadas por CCPA Honduras
# Critical Notes:
#   ISV (Impuesto sobre Ventas) 15% — VAT equivalent; 18% on alcohol, tobacco, luxury goods
#   ISR (Impuesto sobre la Renta) 25% corporate; surcharge (aportación solidaria) 5% on profits >L1M
#   Effective top rate ~30% with surcharge
#   Currency: HNL (Lempira)
#   SAR (Servicio de Administración de Rentas) is the tax authority
#   Fiscal year: January 1 – December 31

