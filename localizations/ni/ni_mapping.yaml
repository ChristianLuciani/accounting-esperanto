# Kontablo Localization Mapping: Nicaragua (NIIF adopted)
# Version: 0.1.0-draft
# Authority: CCPN (Colegio de Contadores Públicos de Nicaragua)
# Standard: NIIF adoptadas por CCPN
# Critical Notes:
#   IVA (Impuesto al Valor Agregado) 15%
#   IR (Impuesto sobre la Renta) 30% corporate
#   IMI (Impuesto Municipal sobre Ingresos) 1% of gross monthly revenue — municipal tax
#   Currency: NIO (Córdoba Oro); historically subject to devaluation (crawling peg to USD)
#   DGI (Dirección General de Ingresos) is the tax authority
#   Fiscal year: January 1 – December 31

