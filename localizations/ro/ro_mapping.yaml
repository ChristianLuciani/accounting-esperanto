# Kontablo Localization Mapping: Romania (Reglementările contabile — Plan de conturi general)
# Version: 0.1.0-draft
# Authority: MFP (Ministerul Finanțelor Publice — Ministry of Public Finance).
#            CECCAR (Corpul Experților Contabili și Contabililor Autorizați din România)
#            for professional standards.
# Standard: Romanian Accounting Regulations implementing Directive 2013/34/EU, approved by
#           Order of MFP No. 1802/2014 (for entities applying Romanian standards) and
#           Order No. 2844/2016 (for entities applying IFRS — listed companies mandatory).
#           Romania has a MANDATORY Plan de Conturi General (General Chart of Accounts)
#           with 9 classes and mandatory 3-digit account codes.
#           Source: Annex to Order 1802/2014 as amended.
# Critical Notes:
#   Romania has a MANDATORY chart of accounts (Plan de conturi) with 9 classes:
#   Class 1: Capital, reserves, loans. Class 2: Fixed assets. Class 3: Stocks.
#   Class 4: Third-party accounts. Class 5: Treasury. Class 6: Expenses. Class 7: Revenue.
#   Class 8: Special accounts (off-balance sheet). Class 9: Management accounts (analytical).
#   3-digit codes are mandatory for the general ledger; 4+ digits are company-specific sub-codes.
#   All codes below are official Romanian Plan de Conturi codes (3-digit level).
#   EU member state: IFRS mandatory for listed companies, banks, insurance (NBR/ASF).
#   TVA (Taxa pe Valoarea Adăugată — VAT): standard rate 19% (effective Jan 1, 2017,
#     reduced from 20%). Reduced rates: 9% (food, medicine, tourism), 5% (social housing,
#     books, events). Source: Codul Fiscal (Legea nr. 227/2015), Articles 268-369.
#   Corporate Income Tax (Impozit pe profit): 16% standard rate (Codul Fiscal, Art. 17).
#     Micro-enterprise tax (Impozit pe veniturile microîntreprinderilor): 1% or 3% on revenue
#     (for entities with revenue < EUR 500,000; conditions apply — verify for 2026 amendments).
#   Social contributions (CAS, CASS, CAM):
#     CAS (pension): employee 25%, employer 0% (post-2018 reform; employer pays CAM).
#     CASS (health): employee 10%.
#     CAM (work insurance levy — Contribuția Asiguratorie pentru Muncă): employer 2.25%.
#   Currency: RON (Romanian Leu).
# VERIFY: Micro-enterprise tax — regime changed significantly in 2023 (OUG 115/2023);
#         thresholds and rates may change further; confirm 2026 Codul Fiscal version.
# VERIFY: VAT reduced rates — multiple changes in recent Fiscal Code amendments; confirm 9% scope.

