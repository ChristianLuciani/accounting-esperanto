# Kontablo Localization Mapping: Hungary (Hungarian Accounting Act / Számviteli törvény)
# Version: 0.1.0-draft
# Authority: Pénzügyminisztérium (Ministry of Finance, Hungary) / NAV (Nemzeti Adó- és Vámhivatal)
# Standard: Hungarian Accounting Act (2000. évi C. törvény a számvitelről — Szt.) with implementing
#           decrees; Hungarian GAAP (HAS — Hungarian Accounting Standards)
# Critical Notes:
#   Hungary has a prescribed chart of accounts structure (Számlatükör) under the Accounting Act.
#   The Egységes számlatükör (Unified Chart of Accounts) is mandatory for business entities.
#   It uses a class-based structure: 1=Fixed assets, 2=Inventories, 3=Cash and receivables,
#   4=Liabilities and equity, 5=Cost by nature, 8=Expenses by function, 9=Revenue.
#   Hungarian GAAP differs from IFRS: cost model for most assets, specific accrual rules,
#   and a mandatory small business tax option (KIVA).
#   Listed companies apply IFRS as adopted by EU (mandatory for consolidated statements of
#   certain categories since 2016, adopted via separate Hungarian IFRS adoption decree).
#   VAT (ÁFA — Általános forgalmi adó): standard rate 27% — the highest standard VAT rate in
#   the EU. Reduced rates: 18% (some food items, accommodation) and 5% (medicines, books,
#   restaurant services, newly built housing).
#   Corporate income tax (TAO — Társasági adó): 9% — the lowest in the EU.
#   KIVA (Kisvállalati adó — small business tax): flat 10% on payroll + dividends (alternative
#   to TAO + employer social contributions for qualifying SMEs).
#   Employer social contribution (Szociális hozzájárulási adó — Szocho): 13% of gross wages.
#   HUF is the functional currency; EUR accounts common.

