# Kontablo Localization Mapping: Barbados (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: ICAB (Institute of Chartered Accountants of Barbados)
# Standard: IFRS as adopted by Barbados
# Critical Notes:
#   Currency: BBD (Barbados Dollar), pegged at 2 BBD = 1 USD. This peg has been maintained
#   since 1975; IAS 21 functional currency analysis should note the peg stability.
#   VAT: 17.5% standard rate. Authority: Barbados Revenue Authority (BRA).
#   Corporate income tax: 5.5% (reduced from 25% following 2018 BEPS/OECD compliance
#   reforms; rate applies uniformly to domestic and international business companies).
#   VERIFY current rate — Barbados has been active in OECD/Inclusive Framework;
#   minimum 15% global minimum tax (Pillar Two) may affect rate as of 2024+.
#   International Business Companies (IBCs): old IBC regime abolished 2019; replaced by
#   unified tax regime at 5.5% (falling to 1% for large multinationals). VERIFY.
#   Tourism and financial services are dominant sectors.

