# Kontablo Localization Mapping: South Africa (SAICA / IFRS)
# Version: 0.1.0-draft
# Authority: South African Institute of Chartered Accountants (SAICA)
# Standard: Full IFRS (JSE-listed) + IFRS for SMEs (unlisted)
# Critical Notes:
#   - JSE-listed companies must use full IFRS
#   - B-BBEE (Black economic empowerment) creates unique equity disclosure requirements
#   - Mining sector uses IFRS 6 + mineral rights accounting
#   - VAT is 15% (standard rate since 2018)
#   - Provisional Tax system creates specific prepaid tax accounts
#   - UIF (Unemployment Insurance Fund) and SDL (Skills Development Levy) are employee cost sub-accounts

