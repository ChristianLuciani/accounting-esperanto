# Kontablo Localization Mapping: Pakistan (IFRS as adopted by ICAP / SECP)
# Version: 0.1.0-draft
# Authority: ICAP (Institute of Chartered Accountants of Pakistan) issues pronouncements.
#            SECP (Securities and Exchange Commission of Pakistan) mandates compliance for
#            public companies under Companies Act 2017. SBP (State Bank of Pakistan) for banks.
# Standard: IFRS as adopted by ICAP. Full IFRS required for listed companies and public
#           interest entities. IFRS for SMEs for smaller entities.
#           Source: Companies Act 2017 (Act No. XIX of 2017), 4th Schedule (for listed companies).
# Critical Notes:
#   No mandatory national chart of accounts for private companies.
#   Codes below follow common practice consistent with ICAP/SECP requirements.
#   Sales Tax: Federal General Sales Tax (GST) 17% standard rate (Sales Tax Act 1990).
#     Provincial sales tax on services (varies: SRB Sindh 13%, PRA Punjab 16%, etc.)
#     Islamic finance (Murabaha, Musharakah, Ijarah, Diminishing Musharakah) is material;
#     Islamic banking is ~25% of total banking assets in Pakistan (SBP Islamic Banking Bulletin).
#     Dedicated accounts for Murabaha receivables, Musharakah investments are required by
#     SBP Shariah Governance Framework for banks; shown here as VERIFY items.
#   Corporate Income Tax: 29% standard rate (Income Tax Ordinance 2001, as amended by
#     Finance Acts). Banking companies: 35%. Super Tax: 10% additional on income > PKR 300M
#     (Finance Act 2022). VERIFY for 2026.
#   Withholding Tax (WHT): extensive system under ITO 2001 — payable on salary, dividends,
#     profit on debt, contracts, imports, exports.
#   EOBI (Employees' Old-Age Benefits Institution): employer 5%, employee 1% of minimum wage.
#   PESSI/SESSI (Social Security): varies by province.
#   Currency: PKR (Pakistani Rupee). Subject to significant depreciation and inflation.
# VERIFY: Corporate tax rate — super tax may change in annual Finance Act; confirm 2026 rate.
# VERIFY: GST rate — 17% confirmed; provincial service tax rates vary and change annually.
# VERIFY: Islamic finance accounts — SBP IFAS (Islamic Financial Accounting Standards) require
#         specialized accounts; entities not under SBP jurisdiction may use simplified treatment.

