# Kontablo Localization Mapping: Sudan (Local Standards / IFRS in progress)
# Version: 0.1.0-draft
# Authority: Sudanese Council of Certified Accountants (SCCA)
# Standard: Sudanese Accounting Standards (SAS) — IFRS adoption in progress
# Critical Notes:
#   No VAT; zakat-based fiscal system (Zakat Chamber levies apply to Muslim businesses)
#   Corporate profit tax: ~35% (VERIFY: rate structure may vary by sector)
#   Currency: Sudanese Pound (SDG); subject to significant inflation and parallel exchange rates
#   Islamic finance system; interest (riba) prohibited; murabaha, musharakah instruments used
#   Sanctions context (US OFAC sanctions partially lifted 2017; situation evolving — VERIFY current status)
#   VERIFY: Exact mapping of Islamic finance instruments to Kontablo standard accounts requires domain expert review
#   Gold and oil export economy; post-South Sudan separation (2011) restructuring ongoing

