# Kontablo Localization Mapping: Madagascar (Plan Comptable Général Malgache / SYSCOHADA-influenced)
# Version: 0.1.0-draft
# Authority: Ordre des Experts Comptables et Financiers de Madagascar (OECFM)
# Standard: Plan Comptable Général Malgache (PCGM) — SYSCOHADA-influenced, not a full OHADA member
# Critical Notes:
#   Currency: MGA (Malagasy Ariary). 1 Ariary = 5 Iraimbilanja.
#   TVA (VAT): 20% standard rate. Authority: Direction Générale des Impôts (DGI).
#   Corporate income tax (IR / Impôt sur les Revenus): 20% standard rate.
#   SYSCOHADA account codes (Class 1-8) used as base; Madagascar is not a full OHADA member
#   but follows SYSCOHADA plan closely since 2005 reform.
#   VERIFY: Madagascar's formal adoption status vs OHADA; some sources classify it as
#   influenced but not member. Official OHADA membership list does not include Madagascar.

