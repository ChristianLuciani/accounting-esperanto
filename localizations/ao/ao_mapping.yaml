# Kontablo Localization Mapping: Angola (PGCA)
# Version: 0.1.0-draft
# Authority: OCPCA (Ordem dos Contabilistas e Peritos Contabilistas de Angola)
# Standard: PGCA — Plano Geral de Contabilidade de Angola (2010, revised)
# Critical Notes:
#   VAT (IVA): 14% (introduced October 2019, replacing previous consumption tax)
#   Corporate tax (IPT — Imposto Industrial): 25% standard; 15% for agriculture
#   Currency: AOA (Angolan Kwanza) — subject to devaluation; significant FX risk
#   PGCA is based on Portuguese accounting tradition, adapted for Angola
#   Oil sector dominates economy; special tax regimes apply to petroleum companies
#   VERIFY: PGCA class structure may mirror Portuguese SNC; exact codes may vary

