# Standard: IFRS as adopted (mandatory for banks and large entities since 2003)
# Critical Notes:
#   VAT (ƏDV — Əlavə Dəyər Vergisi): 18% standard rate
#   Corporate tax (Mənfəət vergisi): 20%
#   Currency: AZN (Azerbaijani Manat) — pegged to USD since 2015 (re-pegged after devaluation)
