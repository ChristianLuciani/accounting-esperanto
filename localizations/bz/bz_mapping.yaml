# Kontablo Localization Mapping: Belize (IFRS adopted)
# Version: 0.1.0-draft
# Authority: ICAB (Institute of Chartered Accountants of Belize)
# Standard: IFRS as adopted by ICAB
# Critical Notes:
#   GST (General Sales Tax) 12.5% — standard rate; some zero-rated supplies (basic foods, exports)
#   Corporate income tax 25% on net chargeable income
#   Currency: BZD (Belize Dollar) — pegged to USD at fixed rate of BZD 2.00 = USD 1.00 since 1978
#   BZD peg is stable and long-standing; USD accounts common given the fixed peg
#   Business Tax (BT) on gross revenue applies in certain sectors (e.g. insurance, finance)
#   BRA (Belize Revenue Authority) is the tax authority
#   Fiscal year: April 1 – March 31 (government); calendar year common for private sector

