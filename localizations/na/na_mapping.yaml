# Kontablo Localization Mapping: Namibia (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: PAN (Public Accountants' and Auditors' Board of Namibia)
# Standard: IFRS as adopted; Companies Act 28 of 2004; Income Tax Act 24 of 1981
# Critical Notes:
#   - Namibia adopts IFRS in full via the Public Accountants' and Auditors' Board (PAAB).
#   - Currency: NAD (Namibian Dollar) — pegged 1:1 to ZAR; ZAR is also legal tender.
#   - VAT: 15% standard rate (aligned with South Africa).
#   - Corporate Income Tax (CIT): 32% standard; 37.5% for mining companies;
#     25% for manufacturing companies (VERIFY — reduced rate conditions apply).
#   - Withholding Tax on dividends: 10% (for non-residents).
#   - Social Security: NSSCF (Namibia Social Security Commission Fund) contributions.
#   - Economy: mining-dominated (diamonds, uranium, copper, zinc).
#   - Namibia's extractive industry accounting closely follows South African practice
#     due to historical and currency ties (Common Monetary Area — CMA).
#   - No mandatory national chart of accounts; codes follow IFRS common practice.

