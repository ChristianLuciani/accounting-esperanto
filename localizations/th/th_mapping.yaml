# Kontablo Localization Mapping: Thailand (TFRS — Thai Financial Reporting Standards)
# Version: 0.1.0-draft
# Authority: FAP (Federation of Accounting Professions under the Royal Patronage of H.M. the King)
# Standard: TFRS (Thai Financial Reporting Standards), TFRS for NPAEs (Non-Publicly Accountable Entities)
# Critical Notes:
#   Thailand has two tiers: TFRS (for PAEs — listed companies and financial institutions, aligned
#   with IFRS with limited carve-outs) and TFRS for NPAEs (simplified, for non-listed entities).
#   FAP does not prescribe a mandatory chart of accounts; codes below reflect the widely-used
#   Thai practice taught by FAP and used in the Revenue Department e-filing (e-Tax Invoice).
#   VAT (ภาษีมูลค่าเพิ่ม, Phasi Mulkha Phoeam): standard rate 7% (temporarily reduced from 10%;
#   renewed annually — currently extended through September 2025, status for 2026 needs verification).
#   Corporate income tax: 20% standard rate; SMEs benefit from reduced rates.
#   WHT (Withholding Tax) is extensive and creates additional receivable/payable accounts.
# VERIFY: 7% VAT rate renewal for 2026 should be confirmed with Thai Revenue Department.

