# Kontablo Localization Mapping: Afghanistan (Transitional — severely disrupted)
# Version: 0.1.0-draft
# Authority: Afghanistan Chartered Accountants Organization (ACAA) — operational status uncertain post-2021
# Standard: IFRS adoption was in progress pre-2021; current status disrupted under Taliban government.
# Critical Notes:
#   VERIFY ALL ENTRIES — formal accounting infrastructure largely disrupted since August 2021.
#   Currency: AFN (Afghan Afghani). Exchange rate highly volatile post-2021.
#   Taxation: Taliban-era tax administration under Ministry of Finance; formal VAT system
#   absent (replaced by business receipts tax ~2-4% on turnover). VERIFY — rates and
#   administration subject to change without published notice.
#   Corporate income tax: was 20% under AISA regime pre-2021. Current enforcement unclear.
#   This mapping reflects pre-2021 IFRS-oriented chart of accounts as documented by ACAA
#   and World Bank technical assistance programs. It should NOT be used for active compliance
#   without verification against current Taliban MoF directives.
#   Sources: World Bank Afghanistan PFM reports (pre-2021); ACAA technical standards.

