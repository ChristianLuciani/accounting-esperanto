# Kontablo Localization Mapping: Saint Vincent and the Grenadines (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: ICAC (Institute of Chartered Accountants of the Caribbean)
# Standard: IFRS as adopted. OECS member; XCD currency via ECCB.
# Critical Notes:
#   Currency: XCD (East Caribbean Dollar), pegged 2.70 XCD = 1 USD.
#   VAT: 15% standard rate. Authority: Inland Revenue Department SVG.
#   Corporate income tax: 30% standard rate. No capital gains tax.
#   Economy: bananas (declining), tourism, financial services (offshore banking).
#   OECS, CARICOM, ECCU member.
#   Geothermal energy development project (La Soufrière area) ongoing — relevant for
#   energy sector asset accounting if applicable.

