# Kontablo Localization Mapping: Antigua and Barbuda (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: ICAC (Institute of Chartered Accountants of the Caribbean)
# Standard: IFRS as adopted. OECS member; XCD currency via ECCB.
# Critical Notes:
#   Currency: XCD (East Caribbean Dollar), pegged 2.70 XCD = 1 USD.
#   VAT: 15% standard rate. Authority: Inland Revenue Department Antigua and Barbuda.
#   Income tax: ABOLISHED in 1976 — Antigua and Barbuda has no personal or corporate
#   income tax. VERIFY — this is a widely cited fact but confirm no alternative profit levy exists.
#   ABST (Antigua and Barbuda Sales Tax) replaced VAT; 15% rate. VERIFY current nomenclature.
#   Economy: tourism (dominant), financial services (offshore sector).
#   CBI (Citizenship by Investment) programme.
#   OECS, CARICOM, ECCU member.
#   Note: absence of income tax means no income tax payable or expense accounts needed;
#   retained for completeness in case of joint ventures with foreign entities subject to
#   home-country tax or future legislative change.

