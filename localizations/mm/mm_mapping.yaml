# Kontablo Localization Mapping: Myanmar (MAS — Myanmar Accounting Standards)
# Version: 0.1.0-draft
# Authority: Myanmar Accountancy Council (MAC)
# Standard: MAS (Myanmar Accounting Standards) — IFRS-aligned, adopted since 2012
# Critical Notes:
#   No standard VAT system; Commercial Tax (CT) at 5% applies to most goods/services
#   Corporate tax (CIT): 25% for local companies; 35% for foreign companies (VERIFY — rates
#   may have changed post-2021 military coup)
#   Currency: MMK (Myanmar Kyat) — significant depreciation post-coup; parallel exchange rates exist
#   Political instability since February 2021 coup affects enforcement and compliance
#   IFRS adoption was underway; implementation may have been disrupted post-coup
#   VERIFY: MAC operational status and MAS enforcement post-2021

