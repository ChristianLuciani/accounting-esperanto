# Kontablo Localization Mapping: Iceland (Bókhaldslög — Icelandic Accounting Act / IFRS)
# Version: 0.1.0-draft
# Authority: RSK (Ríkisskattstjóri — Directorate of Internal Revenue)
# Standard: Lög um bókhald nr. 145/1994 (Accounting Act); IFRS for listed and public interest entities
# Critical Notes:
#   VAT (VSK — virðisaukaskattur): 24% standard; 11% reduced (food, books, hotels, heating)
#   Corporate income tax: 20%
#   Currency: ISK (Icelandic Króna) — NOT EUR; Iceland is EEA but not EU member
#   High inflation environment historically; ISK is volatile
#   No mandatory uniform chart; IFRS-aligned structure common; 1-9 class groupings used in practice
#   Icelandic Financial Supervisory Authority (FME) oversees financial sector reporting
#   VERIFY: Account codes below follow common Icelandic practice; no officially mandated plan

