# Kontablo Localization Mapping: Sri Lanka (SLFRS)
# Version: 0.1.0-draft
# Authority: CA Sri Lanka (Institute of Chartered Accountants of Sri Lanka)
# Standard: SLFRS (Sri Lanka Financial Reporting Standards) — IFRS as adopted
# Critical Notes:
#   VAT: 18% (increased from 15% in late 2022/2023 as part of IMF bailout conditions)
#   Corporate tax (CIT): 30% standard; 14% for qualifying exports/tourism; 40% for banking
#   Currency: LKR (Sri Lankan Rupee) — significant depreciation during 2022 economic crisis
#   2022 ECONOMIC CRISIS: Sri Lanka experienced sovereign default and IMF bailout (2023).
#   IAS 29 (hyperinflation) was discussed but not formally triggered; inflation peaked ~70% (2022)
#   VERIFY: whether IAS 29 was formally invoked for any reporting period
#   Social Security Contribution Levy (SSCL): 2.5% on turnover (introduced 2022, replacing ESC)
#   Advance Income Tax (AIT) and withholding tax apply to various payments

