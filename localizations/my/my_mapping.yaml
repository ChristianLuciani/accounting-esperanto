# Kontablo Localization Mapping: Malaysia (MFRS — Malaysian Financial Reporting Standards)
# Version: 0.1.0-draft
# Authority: MASB (Malaysian Accounting Standards Board)
# Standard: MFRS (IFRS-identical for public interest entities), MPERS (for private entities), 2023
# Critical Notes:
#   Malaysia has two tracks: MFRS (mandatory for listed entities and public interest entities,
#   word-for-word adoption of IFRS since 2012) and MPERS (Malaysian Private Entities Reporting
#   Standard, based on IFRS for SMEs). Account codes are NOT mandated; the numbering below
#   follows widely-used Malaysian practice consistent with the CTIM/MIA recommended chart.
#   GST was abolished in 2018; SST (Sales and Service Tax) was reinstated. SST comprises:
#     Sales Tax: 5% or 10% on manufactured goods
#     Service Tax: 8% (increased from 6% effective March 2024) on taxable services
#   There is no unified VAT number; SST input credit is not universally available (unlike VAT).
# VERIFY: Codes are industry-standard approximations; MASB does not publish a mandatory chart.

