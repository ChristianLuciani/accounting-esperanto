# Kontablo Localization Mapping: Mongolia (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: MICPA (Mongolian Institute of Certified Public Accountants)
# Standard: IFRS as adopted by Mongolia
# Critical Notes:
#   VAT (НӨАТ — Нэмэгдсэн Өртгийн Албан Татвар): 10%
#   Corporate tax (Аж ахуйн нэгжийн орлогын татвар — ААНОАТ): 25% (10% for first MNT 6B)
#   Currency: MNT (Mongolian Tugrik / Tögrög)
#   Mining-dominated economy: copper (Oyu Tolgoi), coal, gold — major exports
#   IFRS mandatory for listed companies and banks; MICPA oversees compliance
#   Withholding tax: 20% on dividends paid to non-residents; 20% on interest
#   Significant FDI in mining sector; entities often maintain dual reporting (IFRS + Mongolian)
#   VERIFY: current CIT tiered rate structure — thresholds may have been updated

