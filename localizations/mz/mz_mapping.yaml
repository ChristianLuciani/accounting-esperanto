# Kontablo Localization Mapping: Mozambique (IFRS / PGC-NIRF)
# Version: 0.1.0-draft
# Authority: OCAM (Ordem dos Contabilistas e Auditores de Moçambique)
# Standard: PGC-NIRF (Plano Geral de Contabilidade — Normas Internacionais de Relato Financeiro)
# Critical Notes:
#   VAT (IVA): 17% standard rate
#   Corporate tax (IRPC — Imposto sobre o Rendimento das Pessoas Colectivas): 32%
#   Currency: MZN (Mozambican Metical)
#   PGC-NIRF aligns with IFRS; adopted for medium/large entities
#   Small entities may use simplified PGC-PE
#   Natural resources (gas, coal) dominate large-entity accounting; special regimes apply
#   VERIFY: exact account codes in PGC-NIRF — structure mirrors Portuguese SNC tradition

