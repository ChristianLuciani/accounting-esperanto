# Kontablo Localization Mapping: Slovakia (Slovenské účtovné štandardy)
# Version: 0.1.0-draft
# Authority: MF SR (Ministerstvo financií Slovenskej republiky)
# Standard: Slovak Accounting Act 431/2002 + Slovak Accounting Standards (SAS)
# Critical Notes:
#   VAT (DPH): 20% standard; 10% reduced (selected food, medicine, books)
#   Corporate income tax: 21% (standard); 15% for micro-entities with revenue ≤ 49,790 EUR
#   Currency: EUR (member since 2009)
#   Mandatory chart of accounts (účtová osnova): classes 0-9
#   Class 0: Long-term assets; Class 1: Stocks; Class 2: Financial accounts
#   Class 3: Settlements; Class 4: Capital and long-term liabilities
#   Class 5: Costs; Class 6: Revenues; Class 7-8: Off-balance; Class 9: Internal
#   VERIFY: 3-digit codes follow the official MF SR účtová osnova for entrepreneurs

