# Kontablo Localization Mapping: Kenya (IFRS as adopted / Companies Act 2015)
# Version: 0.1.0-draft
# Authority: ICPAK (Institute of Certified Public Accountants of Kenya) / CMA (Capital Markets Authority)
# Standard: IFRS (full) for listed / public interest entities; IFRS for SMEs for smaller entities.
#            Governed by: Companies Act No. 17 of 2015, Accountants Act Cap. 531.
# Critical Notes:
#   Kenya adopts full IFRS for public interest entities (PIEs) and listed companies.
#   ICPAK is the competent authority issuing financial reporting standards.
#   No mandatory national chart of accounts exists; codes below reflect widely-used practice
#   consistent with ICPAK guidance and Kenyan accounting education (KCA, Strathmore).
#   VAT: standard rate 16% (VAT Act Cap. 476, revised 2020). Zero-rated and exempt categories exist.
#   Corporate income tax: 30% for resident companies; 37.5% for non-resident branches.
#   PAYE (Pay As You Earn): progressive rates up to 35% for employees.
#   NSSF (National Social Security Fund) and NHIF (National Health Insurance Fund) contributions
#   create additional payroll liability accounts; NSSF Act 2013 rates are significant.
#   KRA (Kenya Revenue Authority) administers tax; eTIMS (electronic Tax Invoice Management System)
#   is mandatory for VAT-registered taxpayers since 2023.
# VERIFY: Codes are industry approximations; ICPAK does not mandate a chart of accounts.

