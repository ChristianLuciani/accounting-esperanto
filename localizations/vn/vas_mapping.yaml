# Kontablo Localization Mapping: Vietnam (VAS - Vietnam Accounting Standards)
# Version: 0.1.0-draft
# Authority: Ministry of Finance of Vietnam
# Standard: VAS (Vietnam Accounting Standards) - Diverges significantly from IFRS
# Critical Notes:
#   - Vietnam does NOT use full IFRS. Large companies will transition to IFRS by 2035 (roadmap 2020).
#   - VAS is based on Vietnamese Decree 200/2014/TT-BTC
#   - MANDATORY 3-digit account code system (similar to French PCG)
#   - VAT system: 0%, 5%, 8%, 10% rates (8% is special reduction post-COVID)
#   - Corporate Tax: 20% standard (17% for SMEs, 32-50% for oil/gas)
#   - Key SME challenge: Most SMEs still use VAS circular 133, NOT IFRS
#   - No concept of OCI (Other Comprehensive Income) in traditional VAS

metadata:
  country: vn
  authority: Ministry of Finance (MoF) - Bộ Tài chính
  standard: vas_decree200_2014
  kontablo_version: 0.1.0
  last_updated: 2026-03-13
  currency: VND
  ifrs_roadmap: 2035
  mandatory_code_system: VAS_3digit
  note: "DIVERGES FROM IFRS. No OCI concept. Specific VAS circulars override some IFRS principles."

