# Kontablo Localization Mapping: Poland (Ustawa o rachunkowości — Accounting Act)
# Version: 0.1.0-draft
# Authority: MF (Ministerstwo Finansów — Ministry of Finance) / KSR (Krajowe Standardy Rachunkowości)
# Standard: Ustawa o rachunkowości z dnia 29 września 1994 r. (consolidated text), KSR 2023
# Critical Notes:
#   Poland has a MANDATORY chart of accounts structure defined in the Accounting Act and the
#   Regulation on the accounting principles (rozporządzenie). The Act prescribes the class
#   structure (classes 0-8) that all entities must follow. Within classes, specific account
#   numbers are recommended but companies may adapt the sub-account level. The class structure
#   presented here is the mandatory framework; sub-accounts follow KSR guidance and common practice.
#   VAT (Podatek od towarów i usług / PTU): standard rate 23%; reduced rates 8%, 5%, 0%.
#   Poland uses Split Payment Mechanism (MPP — Mechanizm Podzielonej Płatności) for B2B VAT
#   above PLN 15,000, creating dedicated VAT bank accounts (separate from operating accounts).
#   CIT (podatek dochodowy od osób prawnych): 19% standard; 9% reduced rate for small taxpayers.
#   The Accounting Act requires entities to maintain a Zakładowy Plan Kont (Company Chart of Accounts)
#   that complies with the mandatory class structure. Codes below are the standard industry chart.

