# Kontablo Localization Mapping: South Sudan (IFRS — early adoption stage)
# Version: 0.1.0-draft
# Authority: Institute of Certified Public Accountants of South Sudan (ICPAS)
# Standard: IFRS as adopted / South Sudan Standards (early stage)
# Critical Notes:
#   VAT: not yet fully implemented; Business Income Tax (BIT) applies
#   Corporate tax: 25% (Business Income Tax)
#   Currency: South Sudanese Pound (SSP); highly volatile; USD widely used in practice
#   World's youngest nation (independence 2011); post-conflict context
#   Petroleum sector dominant; majority of government revenue from oil
#   VERIFY: ICPAS institutional capacity; IFRS adoption may be aspirational in many sectors
#   VERIFY: USD functional currency treatment for petroleum companies under local rules
#   Double-entry bookkeeping enforcement is limited outside Juba and large enterprises

