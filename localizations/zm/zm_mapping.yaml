# Kontablo Localization Mapping: Zambia (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: ZICA (Zambia Institute of Chartered Accountants)
# Standard: IFRS as adopted by Zambia
# Critical Notes:
#   VAT: 16% standard rate
#   Corporate tax: 30% standard; mining sector has different rates (VERIFY — varies by mineral)
#   Currency: ZMW (Zambian Kwacha) — rebased 2013 (old kwacha divided by 1000)
#   Copper mining dominates economy; significant mining-specific accounting rules apply
#   ZICA follows IFRS for PIEs; IFRS for SMEs for smaller entities
#   Withholding tax 20% on dividends; 20% on interest (non-residents)

