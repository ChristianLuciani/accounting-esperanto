# Kontablo Localization Mapping: Zimbabwe (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: ICAZ (Institute of Chartered Accountants of Zimbabwe)
# Standard: IFRS as adopted by Zimbabwe
# Critical Notes:
#   Currency: ZiG (Zimbabwe Gold, introduced April 2024, replacing ZWL)
#   HYPERINFLATION HISTORY: Zimbabwe has a documented hyperinflation history (2008-2009 peak).
#   IAS 29 Financial Reporting in Hyperinflationary Economies applies when cumulative 3-year
#   inflation exceeds 100%. Status as of 2024-2025 requires continuous monitoring.
#   USD is widely used as functional currency alongside ZiG — dual-currency environment.
#   Entities must disclose functional currency; many use USD as functional currency.
#   VAT: 15% standard rate (VERIFY — previously 14.5%, increased 2020)
#   Corporate tax: 25% (VERIFY — surcharges may apply)
#   Withholding tax: 20% on dividends; 15% on interest
#   VERIFY: ZiG exchange rate regime and IAS 29 applicability status as of reporting date

