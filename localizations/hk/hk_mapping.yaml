# Kontablo Localization Mapping: Hong Kong SAR (HKFRS)
# Version: 0.1.0-draft
# Authority: HKICPA (Hong Kong Institute of Certified Public Accountants)
# Standard: HKFRS (Hong Kong Financial Reporting Standards), substantially identical to IFRS
# Critical Notes:
#   - Currency: HKD (Hong Kong Dollar — pegged to USD, band 7.75–7.85)
#   - Profits Tax: 16.5% (corporations) / 15% (unincorporated businesses)
#   - Two-tiered Profits Tax: first HKD 2M at 8.25% (corporations), remainder at 16.5%
#   - NO VAT / NO GST — key differentiator; no indirect tax on business transactions
#   - No capital gains tax
#   - MPF (Mandatory Provident Fund): 5% employer + 5% employee, capped at HKD 1,500/month each
#   - Salaries Tax: levied on individuals separately, not corporate P&L
#   - HKFRS maintained separately by HKICPA but virtually identical to IFRS
#   - One Country, Two Systems: HK has own legal/accounting system independent of mainland China
#   - Account names in English and Traditional Chinese

