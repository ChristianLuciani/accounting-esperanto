# Kontablo Localization Mapping: El Salvador (NIIF adopted)
# Version: 0.1.0-draft
# Authority: CVPCPA (Consejo de Vigilancia de la Profesión de Contaduría Pública y Auditoría)
# Standard: NIIF adoptadas por CVPCPA
# Critical Notes:
#   IVA (Impuesto a la Transferencia de Bienes Muebles y a la Prestación de Servicios) 13%
#   ISR (Impuesto sobre la Renta) 30% on taxable net income > USD 150,000; 25% below
#   Currency: USD (US Dollar — official currency since dollarization January 2001)
#   Bitcoin (BTC) declared legal tender June 2021 (Ley Bitcoin); acceptance mandatory by law
#   Bitcoin legal tender status creates dual-measurement consideration for BTC-denominated transactions
#   BTC at fair value (USD equivalent) at transaction date; volatility is a recognized accounting risk
#   MH (Ministerio de Hacienda) is the tax authority
#   Fiscal year: January 1 – December 31

