# Kontablo Localization Mapping: Italy (Piano dei Conti / OIC)
# Version: 0.1.0-draft
# Authority: OIC (Organismo Italiano di Contabilità) / Codice Civile art. 2423-2435
# Standard: Italian GAAP (Principi Contabili OIC); Codice Civile IV Directive implementation
# Critical Notes:
#   Italy uses a flexible chart of accounts; the structure below follows the most common
#   Italian SME practice aligned with the Codice Civile balance sheet format (art. 2424).
#   Balance sheet classes: B=Immobilizzazioni, C=Attivo Circolante, D=Ratei/Risconti (assets);
#   A=Patrimonio Netto, B=Fondi Rischi, C=TFR, D=Debiti, E=Ratei (liabilities/equity).
#   Listed companies apply IFRS as adopted by EU (D.Lgs. 38/2005).
#   VAT (IVA — Imposta sul Valore Aggiunto): standard rate 22%; reduced 10% and 4%.
#   Corporate income tax: IRES 24% + IRAP 3.9% (regional; varies by sector/region).
#   TFR (Trattamento di Fine Rapporto): Italian statutory employee severance fund — no direct
#   IFRS equivalent; closest mapping is defined-benefit obligation (IAS 19).
#   Account codes below follow the most common Italian ERP default (SAP, Zucchetti, TeamSystem).

