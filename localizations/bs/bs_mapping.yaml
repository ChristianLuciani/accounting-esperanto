# Kontablo Localization Mapping: Bahamas (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: BICA (Bahamas Institute of Chartered Accountants)
# Standard: IFRS as adopted by the Bahamas (mandatory for all public companies and financial
#   institutions; recommended for others).
# Critical Notes:
#   Currency: BSD (Bahamian Dollar), pegged at 1:1 to USD. Both BSD and USD are legal tender.
#   IAS 21 functional currency analysis: USD is the de facto functional currency for most
#   entities given 1:1 peg. VERIFY with engagement-specific facts.
#   No income tax (personal or corporate). VERIFY — The Bahamas has no income tax, capital
#   gains tax, or wealth tax. Confirmed by MOF; this is a foundational characteristic.
#   VAT: introduced January 2015 at 7.5%; increased to 12% in 2018. VERIFY current rate.
#   Business License Tax exists (turnover-based). VERIFY rate schedule.
#   Economy: financial services (dominant offshore centre, IBC regime), tourism.
#   Financial services hub; Securities Industry Act and Financial and Corporate Service
#   Providers Act govern. IBC accounting standards matter.

