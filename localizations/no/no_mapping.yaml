# Kontablo Localization Mapping: Norway (Norwegian Accounting Act / Regnskapsloven)
# Version: 0.1.0-draft
# Authority: NRS (Norsk RegnskapsStiftelse — Norwegian Accounting Standards Board)
# Standard: Norwegian Accounting Act (Regnskapsloven — rskl., LOV-1998-07-17-56 with amendments);
#           NRS standards; Norwegian GAAP for SMEs (NRS 8)
# Critical Notes:
#   Norway does not mandate a specific chart of accounts. The Norsk Standard Kontoplan (NS 4102)
#   is the de-facto standard published by Standard Norge. Supported by Visma, Tripletex, and
#   Fiken (the leading Norwegian cloud accounting platform). 4-digit codes.
#   Norway is NOT in the EU but is in the EEA; listed companies on Oslo Børs apply IFRS.
#   Norwegian GAAP (NGAAP) is the domestic standard for unlisted entities.
#   VAT (Merverdiavgift — MVA): standard rate 25%; reduced 15% (food); 12% (passenger transport,
#   hotel accommodation, cinema). Norwegian VAT Act (merverdiavgiftsloven).
#   Corporate income tax (Selskapsskatt / Skatt på alminnelig inntekt): 22% (since 2019).
#   Petroleum sector taxed at 78% (special petroleum tax). Financial sector: 25%.
#   Employer social contributions (Arbeidsgiveravgift): graduated by geographic zone,
#   from 0% (northernmost counties — Finnmark, Troms/Finnmark parts) to 14.1% (standard).
#   OTP (Obligatorisk tjenestepensjon — mandatory occupational pension): minimum 2% of salary.

