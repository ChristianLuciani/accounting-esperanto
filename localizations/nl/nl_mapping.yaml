# Kontablo Localization Mapping: Netherlands (RJ / Dutch GAAP)
# Version: 0.1.0-draft
# Authority: RJ (Raad voor de Jaarverslaggeving — Dutch Accounting Standards Board)
# Standard: Dutch GAAP (BW2 Titel 9 / RJ-bundel); NL-GAAP SME framework (RJk)
# Critical Notes:
#   The Netherlands does not mandate a specific chart of accounts. The dominant practice
#   in Dutch SME software (Exact, Twinfield, Unit4, Snelstart) uses a 4-digit numeric
#   range broadly aligned with BW2 Titel 9 balance sheet presentation.
#   Listed companies and large entities apply IFRS as adopted by EU (Wft art. 5:25c).
#   RJk (Richtlijnen voor kleine rechtspersonen) governs micro and small entities.
#   VAT (BTW — Belasting over de Toegevoegde Waarde): standard rate 21%; reduced 9% (food,
#   books, medicines, public transport); 0% for export and intra-EU supplies.
#   Corporate income tax (Vpb — Vennootschapsbelasting): 19% (first €200k, 2024) / 25.8% above.
#   Dutch chart of accounts codes below follow Exact Globe / Twinfield default ranges.

