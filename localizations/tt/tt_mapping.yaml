# Kontablo Localization Mapping: Trinidad and Tobago (IFRS adopted)
# Version: 0.1.0-draft
# Authority: ICATT (Institute of Chartered Accountants of Trinidad and Tobago)
# Standard: IFRS as adopted by ICATT
# Critical Notes:
#   VAT 12.5% — standard rate; some zero-rated and exempt supplies (basic food, exports)
#   Corporation Tax 30% general; 35% for petrochemical companies (energy sector)
#   Petroleum Profits Tax (PPT) for upstream oil/gas — separate regime, not covered here
#   Business Levy 0.2% on gross revenue (minimum tax floor)
#   Green Fund Levy 0.3% on gross revenue
#   Currency: TTD (Trinidad and Tobago Dollar); significant USD use in energy transactions
#   BIR (Board of Inland Revenue) is the tax authority
#   Fiscal year: calendar year (January 1 – December 31)

