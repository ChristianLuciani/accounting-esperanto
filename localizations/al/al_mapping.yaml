# Kontablo Localization Mapping: Albania (NAS — Standardet Kombëtare të Kontabilitetit)
# Version: 0.1.0-draft
# Authority: ACC (Albanian Accounting Council — Këshilli Kombëtar i Kontabilitetit)
# Standard: NAS Albania (Standardet Kombëtare të Kontabilitetit); IFRS for listed/public interest entities
# Critical Notes:
#   VAT (TVSH — Tatimi mbi Vlerën e Shtuar): 20% standard; 6% reduced (medicines, medical services, accommodation)
#   Corporate income tax: 15% (standard); 5% for micro/small business (revenue < ALL 14M)
#   Currency: ALL (Albanian Lek)
#   Mandatory chart of accounts: classes 1-9 (Yugoslav-influenced, amended post-1990)
#   Class 1: Non-current assets; Class 2: Inventories; Class 3: Cash and receivables
#   Class 4: Liabilities; Class 5: Equity; Class 6: Revenue; Class 7: Expenses
#   VERIFY: Codes follow the Plan Kontabël i Përgjithshëm (General Accounting Plan) per ACC; verify with current MF Albania guidance

