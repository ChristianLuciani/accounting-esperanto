# Kontablo Localization Mapping: Djibouti (French GAAP tradition / SYSCOHADA-influenced)
# Version: 0.1.0-draft
# Authority: Direction des Impôts et Contributions Diverses — Ministère des Finances (Djibouti)
# Standard: French GAAP-influenced / SYSCOHADA-influenced (not full OHADA member — VERIFY membership status)
# Critical Notes:
#   No personal income tax on salaries (unique in the region)
#   Corporate tax: 25%
#   Currency: Djiboutian Franc (DJF); pegged to USD at DJF 177.72 = USD 1 since 1973
#   USD widely accepted; strategic port economy (Port of Djibouti); significant military base income
#   VERIFY: Djibouti OHADA membership status — it signed but ratification status is uncertain
#   Account codes below follow French PCG-influenced numbering common in Francophone Africa
#   Class 1=Equity/LT liabilities, 2=Fixed Assets, 3=Inventories, 4=Third-party accounts, 5=Financial, 6=Expenses, 7=Revenue

