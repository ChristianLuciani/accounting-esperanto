# Kontablo Localization Mapping: Andorra (Pla General de Comptabilitat Andorrà — PGC Andorrà)
# Version: 0.1.0-draft
# Authority: Col·legi de Comptabilitat i Auditoria d'Andorra (CCAA)
# Standard: Pla General de Comptabilitat Andorrà (PGC Andorrà) — Spanish GAAP-influenced
# Critical Notes:
#   IGI (Impost General Indirecte — Andorra's VAT equivalent) 4.5% standard rate (lowest in Europe)
#   IS (Impost de Societats — corporate income tax) 10%
#   Currency: EUR (uses euro; not EU member but monetary agreement with EU)
#   Dual principality (France + Spain); strong Spanish GAAP influence on PGC Andorrà
#   Significant retail tourism and financial services sectors

