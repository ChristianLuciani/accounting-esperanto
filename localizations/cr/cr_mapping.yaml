# Kontablo Localization Mapping: Costa Rica (NIIF / PCGE Costa Rica)
# Version: 0.1.0-draft
# Authority: CCPA (Colegio de Contadores Públicos de Costa Rica)
# Standard: NIIF adoptadas / PCGE Costa Rica
# Critical Notes:
#   IVA (Impuesto al Valor Agregado) 13% — introduced July 2020 replacing 13% sales tax
#   Reduced IVA rates: 4% (medicines, private education, plane tickets), 2% (basic foods)
#   ISR (Impuesto sobre la Renta) — tiered corporate: 5% / 10% / 20% / 25% / 30%
#   Tiered thresholds set annually by Ministerio de Hacienda
#   Currency: CRC (Costa Rican Colón); major USD usage in real estate and large contracts
#   Ministerio de Hacienda / DGT is the tax authority
#   Fiscal year: October 1 – September 30 (not calendar year — important distinction)

