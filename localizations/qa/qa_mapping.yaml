# Kontablo Localization Mapping: Qatar (QFRS — Qatar Financial Reporting Standards)
# Version: 0.1.0-draft
# Authority: QFCA (Qatar Financial Centre Authority) for QFC-licensed entities.
#            Ministry of Commerce and Industry (MOCI) for onshore Qatar entities.
#            Qatar Central Bank (QCB) for financial institutions.
#            Qatar Stock Exchange (QSE) for listed companies.
# Standard: QFRS = IFRS as adopted. QFCA Rule Book Chapter 7 (Financial Reporting) requires
#           IFRS for all QFC-licensed entities. MOCI requires IFRS for listed Qatari companies.
#           Commercial Companies Law No. 11 of 2015 governs corporate reporting.
# Critical Notes:
#   No mandatory national chart of accounts.
#   Codes below follow common practice consistent with QFRS/IFRS and Big-4 practice in Qatar.
#   NO VALUE ADDED TAX in Qatar as of 2026. Qatar has not ratified the GCC VAT framework.
#     (GCC VAT Agreement 2017: Saudi Arabia, UAE, Bahrain have implemented; Qatar has not.)
#   Corporate Income Tax: 10% on net profits of foreign-owned entities (Income Tax Law
#     No. 24 of 2018, amended by Decree-Law No. 11 of 2021). Qatari and GCC nationals:
#     exempt from corporate tax on business income.
#   Withholding Tax (WHT): 5% on dividends, royalties, interest, and technical fees paid to
#     non-residents (Article 9, Income Tax Law No. 24 of 2018 as amended).
#   No personal income tax on individuals in Qatar.
#   Social Insurance: Qatar General Retirement and Social Insurance Authority (GRSIA):
#     Qatari nationals — employer 10%, employee 5% (Law No. 24 of 2002 as amended).
#     Expatriates: not covered; employers typically provide EOSB (End of Service Benefit)
#     = minimum 3 weeks per year for first 5 years, 4 weeks thereafter (Labor Law No. 14/2004
#     as amended by Law No. 17/2020 re: domestic workers).
#   Islamic Finance: Qatar Islamic Bank (QIB), Masraf Al Rayan, Qatar International Islamic Bank
#     operate under Islamic banking principles. Qard Hasan, Murabaha, Musharakah, Ijara, Sukuk
#     accounts are relevant. AAOIFI standards may supplement IFRS for Islamic institutions.
#   Currency: QAR (Qatari Riyal). Pegged to USD at QAR 3.64 per USD since 1980.
# VERIFY: Corporate income tax — 10% rate confirmed under Law 24/2018 as amended by Law 11/2021;
#         petroleum and petrochemicals sector subject to different rate (35% — VERIFY).
# VERIFY: EOSB calculation — Law 17/2020 introduced wage protection; Labor Law amendments
#         ongoing; confirm current EOSB formula in 2026.

