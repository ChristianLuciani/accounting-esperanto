  # === TILINPÄÄTÖSSIIRTOJEN KERTYMÄ (Accumulated Appropriations — Finnish tax-specific) ===

  "2100":
    name: "Poistoero (Accelerated Depreciation Difference — Finnish tax reserve)"
    nature: "Credit"
    level: 2
    kontablo_uuid: "00000000-0000-4000-8000-000000000504"
    aggregation_rules:
      - "sum"
    # VERIFY: Finnish tax accounting allows higher depreciation rates than accounting standards.
    # The 'poistoero' is the cumulative difference — a tax-specific reserve unique to Finnish GAAP.
    # No direct IFRS equivalent; closest is deferred tax liability, but Finnish GAAP treats it
    # separately without splitting out deferred tax.

  "2110":
    name: "Vapaaehtoiset varaukset (Voluntary Tax Reserves)"
    nature: "Credit"
    level: 2
    kontablo_uuid: "00000000-0000-4000-8000-000000000504"
