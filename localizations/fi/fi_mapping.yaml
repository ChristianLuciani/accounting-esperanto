# Kontablo Localization Mapping: Finland (Finnish Accounting Act / KPL)
# Version: 0.1.0-draft
# Authority: KILA (Kirjanpitolautakunta — Accounting Board) / Työ- ja elinkeinoministeriö (TEM)
# Standard: Finnish Accounting Act (Kirjanpitolaki — KPL, 1336/1997 with amendments);
#           Finnish Accounting Ordinance (Kirjanpitoasetus — KPA, 1339/1997)
# Critical Notes:
#   Finland does not mandate a specific chart of accounts. The dominant SME practice follows
#   the Tilikartta published by Taloushallintoliitto (Finnish Accounting Firm Association)
#   and supported by Procountor, Netvisor, and Fennoa. The standard uses 4-digit codes.
#   Finland adopted EU Directive 2013/34 via the Accounting Act reform (2016).
#   Listed companies apply IFRS as adopted by EU.
#   VAT (ALV — Arvonlisävero): standard rate 25.5% (since Sep 2024; was 24%); reduced 14%
#   (food, animal feed, restaurant services); 10% (books, medicines, passenger transport,
#   cultural/sporting events).
#   Corporate income tax (Yhteisövero): 20% (since 2014).
#   Employer social contributions include TyEL (earnings-related pension), SoVa (social
#   insurance, sickness, unemployment), and tapaturmavakuutus (accident insurance).
#   Account codes follow Taloushallintoliitto / Procountor default ranges.

