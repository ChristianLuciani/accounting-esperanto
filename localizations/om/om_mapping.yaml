# Kontablo Localization Mapping: Oman (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: CPA Oman (previously ICAO — Institute of Chartered Accountants of Oman)
# Standard: IFRS as adopted by Oman
# Critical Notes:
#   VAT: 5% (introduced April 2021 — one of the last GCC countries to implement VAT)
#   Corporate tax (CIT): 15% standard; 3% for small businesses (annual revenue < OMR 3M)
#   Currency: OMR (Omani Rial) — pegged to USD at OMR 1 = USD 2.6008
#   Oil and gas sector dominates; Vision 2040 diversification in progress
#   Zakat not applicable in Oman (applies in Saudi Arabia, not Oman — VERIFY)
#   Withholding tax: 10% on dividends, royalties, services paid to non-residents
#   Arabic is official language; English widely used in business

