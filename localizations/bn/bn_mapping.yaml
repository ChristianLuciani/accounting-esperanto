# Kontablo Localization Mapping: Brunei Darussalam (BDSAS / IFRS-aligned)
# Version: 0.1.0-draft
# Authority: Registrar of Companies / BICPA (Brunei Darussalam Institute of Certified Public Accountants)
# Standard: BDSAS (Brunei Darussalam Standards on Auditing and Accounting) — IFRS-aligned
# Critical Notes:
#   - Currency: BND (Brunei Dollar — pegged 1:1 to SGD under Currency Interchangeability Agreement since 1967)
#     SGD is accepted as legal tender in Brunei; BND accepted in Singapore
#   - Corporate Income Tax: 18.5% (reduced from 22% in 2014); preferential rates for SMEs
#   - No personal income tax
#   - No GST / No VAT
#   - Oil and gas sector dominated by Brunei Shell Petroleum (BSP) and Petroleum Brunei (BNPC)
#     Special petroleum income tax applies to upstream oil and gas: 55% on petroleum profits
#   - Islamic Finance: prevalent — Takaful (Islamic insurance), Murabaha (cost-plus financing),
#     Ijarah (Islamic leasing), Musharakah (partnership) accounts are standard
#   - Zakat: mandatory religious levy for Muslim employees; employer deducts and remits to Tabung Amanah Islam Brunei (TAIB)
#   - Halal certification costs may be a significant operating expense
#   - MoF (Ministry of Finance and Economy) maintains accounting regulations
#   - Malay (Bahasa Melayu) is official language; English widely used in business

