# Kontablo Localization Mapping: Armenia (IFRS for PIEs / Armenian Accounting Standards)
# Version: 0.1.0-draft
# Authority: Chamber of Auditors of the Republic of Armenia
# Standard: IFRS mandatory for PIEs; Armenian Accounting Standards (AAS) for others
# Critical Notes:
#   VAT (ԱԱՀ — Ավելացված Արժեքի Հարկ): 20%
#   Corporate tax (Շահութահարկ): 18%
#   Currency: AMD (Armenian Dram)
#   IFRS mandatory for banks, insurance companies, and listed companies since 2013
#   Small and medium entities may use simplified AAS
#   Turnover tax option for micro-enterprises (5% on turnover instead of CIT)
#   Armenia member of EAEU (Eurasian Economic Union); tax alignment with Russia/Kazakhstan
#   VERIFY: exact IFRS adoption scope — Chamber of Auditors website is authoritative

