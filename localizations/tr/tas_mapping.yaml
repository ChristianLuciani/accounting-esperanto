# Kontablo Localization Mapping: Turkey (TAS / Turkish GAAP + IFRS)
# Version: 0.1.0-draft
# Authority: Public Oversight, Accounting and Auditing Standards Authority (KGK)
# Standard: TAS (Turkish Accounting Standards) = IFRS adopted 2005
#            + Mandatory Uniform Chart of Accounts (Tek Düzen Hesap Planı - TDHP)
# Critical Notes:
#   *** HYPERINFLATION ALERT: IAS 29 IS MANDATORY FOR TURKEY AS OF 2022 ***
#   - Turkey's cumulative 3-year inflation exceeded 100% in 2021-2022
#   - All financial statements must be restated in constant purchasing power (TL)
#   - REMA-equivalent accounts: "Finansal Varlıklara İlişkin Yeniden Değerleme Farkları"
#   - The Tek Düzen Hesap Planı (TDHP) is a MANDATORY 3-digit code system
#   - VAT system: KDV at 1%, 8%, 18%, 20% rates (changed in 2023)
#   - Corporate tax: 25% (increased from 20% in 2022)

metadata:
  country: tr
  authority: KGK (Public Oversight Board)
  standard: tas_tdhp_2024
  kontablo_version: 0.1.0
  last_updated: 2026-03-13
  currency: TRY
  hyperinflation: true # IAS 29 ACTIVE
  mandatory_code_system: TDHP_3digit

mappings:
  # TDHP uses a mandatory 3-digit code system similar to France's PCG
  # Class 1: Short-term Assets, Class 2: Long-term Assets, Class 3: Short-term Liabilities
  # Class 4: Long-term Liabilities, Class 5: Equity, Class 6: Revenue, Class 7: COGS
  # Class 8: Operating Expenses, Class 9: Memo accounts

  # --- ASSETS (Class 1 + 2) ---
  "100":
