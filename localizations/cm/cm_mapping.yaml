# Kontablo Localization Mapping: Cameroon (SYSCOHADA)
# Version: 0.1.0-draft
# Authority: Ordre National des Experts Comptables du Cameroun (ONECCA)
# Standard: SYSCOHADA Révisé (2017)
# Critical Notes:
#   SYSCOHADA mandatory chart of accounts — same class structure as all OHADA zone countries
#   VAT (TVA): 19.25% (16.5% base + 10% surtax — VERIFY; rate composition may differ from standard 18%)
#   Corporate tax (IS): 30% (VERIFY — some sources cite 33% with surtax)
#   Currency: XAF (Central African CFA franc, pegged to EUR via BEAC)
#   Cameroon uses Central African CFA franc (XAF), distinct from West African CFA franc (XOF)
#   Bilingual country (French/English) — accounts follow French SYSCOHADA numbering

