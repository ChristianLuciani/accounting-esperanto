# Kontablo Localization Mapping: Rwanda (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: ICPAR (Institute of Certified Public Accountants of Rwanda)
# Standard: IFRS as adopted by Rwanda (mandatory for PIEs from 2016)
# Critical Notes:
#   VAT: 18% standard rate
#   Corporate tax (CIT): 30% standard; 15% for preferred sector companies
#   Currency: RWF (Rwandan Franc)
#   One of Africa's fastest-growing economies; strong financial sector regulation
#   IFRS for SMEs adopted alongside full IFRS
#   Capital gains tax: 5% on listed companies; otherwise part of CIT
#   Withholding tax: 15% on dividends; 15% on interest (non-residents)

