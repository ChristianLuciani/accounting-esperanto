# Kontablo Localization Mapping: Libya (Transitional / IFRS in progress)
# Version: 0.1.0-draft
# Authority: Libyan Accountants and Auditors Association (LAAA)
# Standard: Libyan accounting standards (transitional; IFRS adoption in progress)
# Critical Notes:
#   VAT: NO VAT as of 2024 (Libya does not have a general VAT system — VERIFY)
#   Corporate tax (CIT): 20% standard; oil sector subject to special Petroleum Revenue Act
#   Currency: LYD (Libyan Dinar)
#   POST-CONFLICT CONTEXT: Libya has two parallel governments (Tripoli-based GNU and
#   Tobruk-based HoR) since 2014; accounting standards enforcement is fragmented
#   Central Bank of Libya split between east and west factions (resolved 2023 — VERIFY status)
#   Oil economy: NOC (National Oil Corporation) dominates; special sector accounting rules
#   IFRS adoption was progressing before 2011 revolution; status post-conflict is uncertain
#   Stamp duty and indirect taxes apply in lieu of VAT
#   VERIFY: current institutional status of LAAA and CIT enforcement uniformity

