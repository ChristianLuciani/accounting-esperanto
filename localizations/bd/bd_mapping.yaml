# Kontablo Localization Mapping: Bangladesh (BFRS — Bangladesh Financial Reporting Standards)
# Version: 0.1.0-draft
# Authority: ICAB (Institute of Chartered Accountants of Bangladesh) adopts BFRS.
#            BSEC (Bangladesh Securities and Exchange Commission) mandates compliance for
#            listed companies. Bangladesh Bank (central bank) for financial institutions.
#            Financial Reporting Act 2015 established FRC (Financial Reporting Council).
# Standard: BFRS = IFRS as adopted by ICAB. Bangladesh has adopted IFRS Standards with
#           minimal modifications. Source: Financial Reporting Act 2015 (Act No. 16 of 2015).
# Critical Notes:
#   No mandatory national chart of accounts for private companies.
#   Codes below follow common practice consistent with BFRS/ICAB educational materials.
#   VAT: 15% standard rate (Value Added Tax and Supplementary Duty Act 2012, effective 2019).
#     Reduced rates exist for certain services (truncated base method).
#     VAT return: Mushak forms (Mushak-9.1 for general taxpayers).
#   Corporate Income Tax (ITO 1984, Income Tax Act 2023 replacing ITO 1984):
#     Listed companies: 20-22.5% (various schedules). Unlisted: 27.5%.
#     Banks and financial institutions: 37.5-40%.
#     The Income Tax Act 2023 (Act 13 of 2023) replaced the ITO 1984 — VERIFY current rates.
#   Source Tax (Withholding): extensive; on payments for services, rent, dividends.
#   Provident Fund: mandatory for many employers; BEPZA (export zones) has own rules.
#   Gratuity: mandatory after 5 years of service (Labor Act 2006, Section 26-27).
#   Currency: BDT (Bangladeshi Taka). Managed float vs USD.
# VERIFY: Corporate income tax rates — Income Tax Act 2023 significantly restructured rates;
#         confirm applicable rates for fiscal year 2025-2026.
# VERIFY: VAT truncated base rates — sector-specific deviations are extensive; verify for
#         specific industries (garments/RMG have special VAT treatment).

