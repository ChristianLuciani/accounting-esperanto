# Kontablo Localization Mapping: Belgium (Belgian GAAP / MAR)
# Version: 0.1.0-draft
# Authority: CBN/CNC (Commissie voor Boekhoudkundige Normen / Commission des Normes Comptables)
# Standard: Belgian GAAP under the Wetboek van Vennootschappen en Verenigingen (WVV) /
#           Code des Sociétés et des Associations (CSA); KB/AR of 29 April 2019
# Critical Notes:
#   Belgium has a MANDATORY standardised chart of accounts (Minimum Algemeen Rekeningenstelsel /
#   Minimum Normalisé des Comptes — MAR/MNC) for entities required to file annual accounts
#   with the NBB (National Bank of Belgium). This is unusual among EU member states.
#   The MAR uses a 6-class structure with 2-digit primary codes expandable to 6 digits.
#   Classes: 1=Equity/Long-term liabilities, 2=Fixed Assets, 3=Inventories, 4=Receivables/
#   Payables, 5=Financial instruments, 6=Expenses, 7=Income.
#   Listed companies apply IFRS as adopted by EU.
#   Belgium is officially bilingual (NL/FR). Account names given in Dutch with French translation.
#   VAT (BTW/TVA): standard 21%; reduced 12% (restaurants, coal), 6% (food, pharma, books),
#   and 0% (newspapers). Federal and regional tax rates apply.
#   Corporate income tax (Ven.B./I.Soc.): 25% standard (2024); reduced 20% for qualifying SMEs
#   on first €100k profit.

