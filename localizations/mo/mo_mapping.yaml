# Kontablo Localization Mapping: Macau SAR (MFRS / Macau Financial Reporting Standards)
# Version: 0.1.0-draft
# Authority: DSEC (Direcção dos Serviços de Estatística e Censos) / MSAR Government
# Standard: MFRS — influenced by Portuguese GAAP (POC/SNC) and IFRS; IFRS adopted for large entities
# Critical Notes:
#   - Currency: MOP (Macanese Pataca — pegged to HKD at ~1.03; HKD widely accepted)
#   - Complementary Tax (Imposto Complementar de Rendimentos — ICR): 12% for Group A (large companies)
#     Group B (smaller companies): assessed on presumed profit, different regime
#   - Gaming Revenue Tax: 39% of Gross Gaming Revenue — applies to the 6 concessionaires
#     (SJM, Galaxy, Sands China, Wynn Macau, MGM China, Melco Resorts)
#   - NO VAT — Macau has no general indirect consumption tax
#   - Industrial Tax (Imposto Industrial): annual fixed tax on business activity (minor)
#   - Tourism Tax on hotel stays: 5% MOP per room per night (minor)
#   - Official languages: Portuguese and Chinese (Cantonese)
#   - Economy dominated by gaming (~80% of government revenue pre-COVID) and tourism
#   - Special accounting rules apply to gaming concessionaires under Law 16/2001
#   - Portuguese accounting terminology used; English translation provided

