# Kontablo Localization Mapping: Monaco (French PCG / IFRS for listed)
# Version: 0.1.0-draft
# Authority: Ordre des Experts-Comptables et Commissaires aux Comptes de Monaco
# Standard: French PCG (Plan Comptable Général) — Monaco applies French accounting rules
# Critical Notes:
#   No personal income tax on individuals
#   Corporate tax (IS — Impôt sur les Bénéfices) 25% applies only to profits derived from outside Monaco
#   Monaco-resident companies deriving ≥75% of revenue from Monaco: exempted from IS — VERIFY
#   Currency: EUR (uses euro; not EU member but monetary agreement with EU)
#   Enclave within France; French PCG account codes apply directly
#   VAT (TVA): France's VAT framework applies — standard rate 20%, reduced rates 5.5% / 10%

