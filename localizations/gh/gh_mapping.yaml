# Kontablo Localization Mapping: Ghana (GFRS / IFRS as adopted by ICAG)
# Version: 0.1.0-draft
# Authority: ICAG (Institute of Chartered Accountants, Ghana) / SEC (Securities and Exchange Commission)
# Standard: Ghana Financial Reporting Standards (GFRS) — IFRS adopted without modification for
#            public interest entities (PIEs). Ghana Financial Reporting Standards for SMEs for
#            smaller entities. Governed by: Companies Act, 2019 (Act 992); Financial Reporting
#            Act, 2004 (Act 654) as amended by Financial Reporting Amendment Act 2016 (Act 934).
# Critical Notes:
#   Ghana adopted full IFRS as its national standard for PIEs through ICAG. The Financial
#   Reporting Centre (FRC) oversees compliance. No mandatory chart of accounts exists; codes
#   below reflect common practice in Ghanaian accounting consistent with ICAG educational materials.
#   VAT (Value Added Tax): standard rate 15% (VAT Act, 2013 — Act 870 as amended).
#   COVID-19 Levies and other fiscal levies may affect effective rates; structure includes:
#     VAT: 15%
#     NHIL (National Health Insurance Levy): 2.5%
#     GETFund Levy: 2.5%
#   Combined "tax" on taxable supplies is effectively 19.25% (or 21.9% with COVID levy).
#   Corporate income tax: 25% standard rate (varies by sector — extractives, hotels, agriculture).
#   PAYE (Pay As You Earn): progressive bands under Income Tax Act, 2015 (Act 896).
#   SSNIT (Social Security and National Insurance Trust): employer 13%, employee 5.5%.
#   GHS (Ghana Cedi) is subject to significant depreciation; FX exposure is material for entities
#   with USD-denominated obligations (loans, imports).
# VERIFY: Codes are industry approximations; ICAG does not mandate a chart of accounts.
# VERIFY: VAT/levy rates — confirm composite rate for 2026 with GRA (Ghana Revenue Authority).

