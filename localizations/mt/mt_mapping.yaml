# Kontablo Localization Mapping: Malta (Maltese GAAP / IFRS)
# Version: 0.1.0-draft
# Authority: MIA (Malta Institute of Accountants) / MFSA (Malta Financial Services Authority)
# Standard: General Accounting Principles for Smaller Entities (GAPSE) for SMEs; IFRS for listed/larger
# Critical Notes:
#   VAT: 18% standard; 7% accommodation; 5% medical/electrical/printed matter; 0% food/medicine (some)
#   Corporate income tax: 35% (statutory); effective ~5% via shareholder refund system
#   Refund system: shareholders of Maltese companies can claim 6/7 refund of tax on distributed profits
#   Currency: EUR (member since 2008)
#   No mandatory uniform chart; IFRS-aligned structure widely used
#   Companies Act 1995 (Cap. 386) governs financial reporting
#   VERIFY: Account numbers below follow common UK/IFRS-influenced practice used in Malta

