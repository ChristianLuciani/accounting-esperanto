# Kontablo Localization Mapping: Austria (UGB / RLG — Austrian GAAP)
# Version: 0.1.0-draft
# Authority: KWT (Kammer der Wirtschaftstreuhänder) / Fachsenat für Unternehmensrecht und Revision
# Standard: Austrian GAAP under UGB (Unternehmensgesetzbuch) §§ 189-283; supplemented by
#           AFRAC (Austrian Financial Reporting and Auditing Committee) standards
# Critical Notes:
#   Austria does not mandate a specific chart of accounts, but the Kontenrahmen (KR) published
#   by the WKO (Wirtschaftskammer Österreich) is the de-facto standard. The most common variant
#   is the Einheitskontenrahmen (EKR) or the DATEV-compatible Österreichischer Kontenrahmen (ÖKR).
#   The codes below follow the ÖKR structure commonly used in Austrian SME practice.
#   Listed companies apply IFRS as adopted by EU.
#   UGB requires preparation of annual financial statements; GmbH and AG must file with
#   the Firmenbuch (commercial register).
#   VAT (USt — Umsatzsteuer): standard rate 20%; reduced 10% (food, books, passenger transport,
#   rents for residential purposes); reduced 13% (cultural events, plants, some food).
#   Corporate income tax (KSt — Körperschaftsteuer): 24% (2023), 23% (2024 onward).
#   Minimum corporate tax (Mindestkörperschaftsteuer) applies even in loss years (€500 GmbH / €3,500 AG).
#   Kommunalsteuer (local payroll tax): 3% of wages; paid to municipality.
#   Dienstgeberbeitrag (DB) + Dienstgeberzuschlag (DZ): payroll-related social contributions.

