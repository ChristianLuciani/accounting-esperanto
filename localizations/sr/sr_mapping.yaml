# Kontablo Localization Mapping: Suriname (IFRS as adopted / Dutch-influenced)
# Version: 0.1.0-draft
# Authority: NOVAA (Nederlandse Orde van Accountants en Belastingadviseurs in Suriname)
# Standard: IFRS as adopted; Dutch-influenced accounting tradition (pre-independence Netherlands
#   accounting norms persist). Companies Act requires IFRS for listed entities.
# Critical Notes:
#   Currency: SRD (Surinamese Dollar). Replaced SRG (Guilder) in 2004 at 1000:1.
#   Severe currency depreciation and inflation 2020-2023 following debt crisis;
#   IAS 29 hyperinflation criteria may have been met — VERIFY current inflation trajectory.
#   VAT (BTW — Belasting Toegevoegde Waarde): 10% standard rate. VERIFY — Suriname
#   introduced VAT in 2022 replacing turnover tax. Authority: Belastingdienst Suriname.
#   Corporate income tax: 36% standard rate. VERIFY — IMF restructuring program may affect.
#   Gold and oil extraction dominant (Newmont Merian, Staatsolie). USD used in extractive sector.
#   Dollarization pressure: USD and EUR widely used alongside SRD.

