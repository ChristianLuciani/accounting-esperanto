# Kontablo Localization Mapping: Guyana (IFRS adopted)
# Version: 0.1.0-draft
# Authority: ICAG (Institute of Chartered Accountants of Guyana)
# Standard: IFRS as adopted by ICAG
# Critical Notes:
#   VAT 14% — standard rate; zero-rated exports and basic food items
#   Corporate tax 25% general; petroleum sector 25-40% under Production Sharing Agreements (PSAs)
#   Oil sector context: ExxonMobil, Hess, CNOOC Stabroek Block — major oil discovery 2015+
#   Guyana became significant oil producer ~2020; petroleum accounting is a distinct sub-regime
#   Currency: GYD (Guyanese Dollar); significant USD use in oil/mining sector and foreign investment
#   GRA (Guyana Revenue Authority) is the tax authority
#   Fiscal year: calendar year (January 1 – December 31)

