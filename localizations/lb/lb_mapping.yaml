# Kontablo Localization Mapping: Lebanon (Lebanese GAAP / Code de Commerce / IFRS for listed)
# Version: 0.1.0-draft
# Authority: LACPA (Lebanese Association of Certified Public Accountants)
# Standard: Lebanese GAAP (Code de Commerce influence) / IFRS for listed entities
# Critical Notes:
#   SEVERE HYPERINFLATION CONTEXT — IAS 29 "Financial Reporting in Hyperinflationary Economies"
#   APPLIES as of 2019 economic collapse; cumulative inflation exceeded 100% threshold
#   Lebanese Pound (LBP) has collapsed: from ~1,500 LBP/USD (pre-2019 peg) to >85,000+ LBP/USD (2024)
#   Multiple exchange rates coexisted: official peg (defunct), Sayrafa rate, parallel/black market rate
#   USD de-facto standard for large transactions, real estate, commercial contracts
#   Many entities now maintain books in USD; dual-currency reporting is common
#   VAT (TVA) 11% — introduced 2002; collection and enforcement severely impaired post-2019
#   Corporate income tax 17% (pre-crisis nominal rate; effective enforcement collapsed)
#   IAS 29 treatment: restate non-monetary items using general price index; gain/loss on net monetary
#   position recognized in P&L; comparative periods also restated
#   Banking sector accounts use separate regulatory framework (Banque du Liban circulars)
#   This mapping uses USD as functional currency (de-facto standard post-2019); note in metadata

