# Kontablo Localization Mapping: Haiti (SYSCOHADA / local standards)
# Version: 0.1.0-draft
# Authority: ONECCA (Ordre National des Experts Comptables et Comptables Autorisés d'Haïti)
# Standard: SYSCOHADA adapté / normes locales haïtiennes
# Critical Notes:
#   Haiti adopted SYSCOHADA (OHADA accounting system) due to francophone heritage,
#   though Haiti is not an OHADA member state — adoption is practical/conventional, not treaty-based
#   IRI (Impôt sur le Revenu des Individus) and IS (Impôt sur les Sociétés) ~30% corporate
#   TCA (Taxe sur le Chiffre d'Affaires) — turnover tax, functionally a VAT at ~10%
#   Currency: HTG (Haitian Gourde); severe instability — USD de-facto standard for large transactions
#   Significant dollarization of the economy in practice; USD accounts common in commercial entities
#   SYSCOHADA uses a decimal plan comptable (classe 1–9); this mapping uses the standard classes
#   Context: severe macroeconomic and political instability; accounting standards enforcement weak
#   IAS 29 hyperinflation indicators may apply depending on cumulative inflation measurement period

