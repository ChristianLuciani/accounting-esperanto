# Kontablo Localization Mapping: Luxembourg (Lux GAAP / IFRS)
# Version: 0.1.0-draft
# Authority: CSSF (Commission de Surveillance du Secteur Financier) / IRE (Institut des Réviseurs d'Entreprises)
# Standard: Lux GAAP (Loi du 19 décembre 2002 on accounting); IFRS for listed and financial sector
# Critical Notes:
#   VAT (TVA): 17% standard (lowest in EU); 14% intermediate; 8% reduced; 3% super-reduced (food, medicine, books)
#   Corporate income tax: ~24.94% (IRC 17% + unemployment fund surcharge 7% + municipal business tax ~6.75%)
#   Currency: EUR
#   No mandatory uniform chart of accounts; French PCG influence common in practice
#   Finance and holding company sector-specific rules apply (SOPARFI, SIF, SICAR, etc.)
#   Financial sector supervised by CSSF has additional reporting requirements
#   VERIFY: Account codes below follow French PCG-influenced practice common in Luxembourg

