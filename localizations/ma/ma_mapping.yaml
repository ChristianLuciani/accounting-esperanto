# Kontablo Localization Mapping: Morocco (Plan Comptable Général Marocain — PCGM)
# Version: 0.1.0-draft
# Authority: CNC (Conseil National de la Comptabilité) — Décret n° 2-89-61 du 10 chaabane 1410
#            (6 mars 1990). Governed by Loi n° 9-88 relative aux obligations comptables
#            des commerçants (Code de commerce marocain).
# Standard: Plan Comptable Général Marocain (PCGM), mandatory since 1994.
#           IFRS required for banks (Bank Al-Maghrib circular) and listed companies (AMMC).
# Critical Notes:
#   Morocco has a MANDATORY 9-class chart of accounts modeled on the French PCG.
#   Class 1-5: Balance sheet. Class 6-7: Income statement. Class 8: Special accounts.
#   Class 9: Analytical accounts (optional but structured).
#   Codes are 4-digit minimum; sub-accounts use 5-6 digits (only 4-digit level shown here).
#   VAT (TVA — Taxe sur la Valeur Ajoutée): standard rate 20%; reduced rates 14%, 10%, 7%.
#     Source: Code Général des Impôts (CGI) Maroc, Articles 87-125.
#   Corporate Income Tax (IS — Impôt sur les Sociétés): progressive from 10% to 35%
#     (progressive scale introduced by Loi de Finances 2023).
#   IR (Impôt sur le Revenu) applies to individuals on salary income.
#   CNSS (Caisse Nationale de Sécurité Sociale): employer ~21.09%, employee ~6.29%.
#   Currency: MAD (Moroccan Dirham).
# VERIFY: Class 8 codes — "Comptes spéciaux" usage is rare; codes confirmed from PCGM text.
# VERIFY: Corporate IS rates — progressive scale since 2023 LF; confirm 2026 applicable bands.

