# Kontablo Localization Mapping: Uruguay (NIIF / NIFCS — IFRS as adopted)
# Version: 0.1.0-draft
# Authority: AIN (Auditoría Interna de la Nación) — issues accounting standards for all entities.
#            BCU (Banco Central del Uruguay) for financial entities.
#            IRAE administered by DGI (Dirección General Impositiva).
# Standard: Decreto 291/014 (2014) — adopts NIIF (IFRS) as the mandatory accounting framework
#            for all entities above size thresholds; smaller entities use NIFCS (Normas de
#            Información Financiera para Compañías Simplificadas) which is IFRS for SMEs.
#            The framework is formally called "NIIF adoptadas en Uruguay" / NIFCS.
# Critical Notes:
#   Uruguay adopted IFRS (as NIIF) via Decreto 291/014, effective for fiscal years beginning
#   January 1, 2015. Mandatory for companies exceeding threshold: assets > UI 30,000,000 or
#   revenues > UI 100,000,000 (UI = Unidades Indexadas). Smaller entities use NIFCS.
#   There is NO mandatory chart of accounts prescribed by AIN; the codes below reflect the
#   widely-used Uruguayan convention consistent with professional training (CCEAU, IUACUA).
#   IVA (Impuesto al Valor Agregado / VAT): basic rate 22%; minimum rate 10% (food, medicines,
#   certain services); zero rate for exports. Administered by DGI.
#   IRAE (Impuesto a las Rentas de las Actividades Económicas / Corporate Income Tax): 25% rate.
#   IRPF (Impuesto a la Renta de las Personas Físicas): employee income tax, progressive.
#   BPS (Banco de Previsión Social): social security contributions — employer ~7.5% + FONASA.
#   Uruguay uses Unidades Indexadas (UI) and Unidades Reajustables (UR) for inflation indexing;
#   however, Uruguay does NOT currently qualify as a hyperinflationary economy under IAS 29
#   (unlike neighboring Argentina and Venezuela). IAS 29 monitoring is nonetheless warranted
#   given regional context.
#   The Uruguayan peso (UYU) has experienced moderate but persistent inflation; entities with
#   USD-denominated assets/liabilities must apply IAS 21 translation.
# VERIFY: Codes are industry approximations; AIN does not mandate specific account numbering.
# VERIFY: UI threshold amounts for mandatory NIIF application — update annually.

