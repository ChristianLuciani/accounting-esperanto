# Kontablo Localization Mapping: New Zealand (NZ GAAP / XRB)
# Version: 0.1.0-draft
# Authority: XRB (External Reporting Board) / FMA (Financial Markets Authority) / IRD (Inland Revenue)
# Standard: New Zealand GAAP under the Financial Reporting Act 2013 (FRA 2013);
#           NZ IFRS (for publicly accountable entities); NZ IFRS RDR (reduced disclosure);
#           PBE Standards for public benefit entities; NZ IFRS for SMEs (for eligible entities)
# Critical Notes:
#   New Zealand does not mandate a specific chart of accounts. The dominant SME practice
#   follows the Xero NZ / MYOB NZ default chart, using numeric ranges similar to Australia.
#   XRB adopted IFRS-aligned standards as NZ IFRS starting 2005. Tier 1 = full NZ IFRS;
#   Tier 2 = NZ IFRS RDR (reduced disclosures); Tier 3/4 = simplified standards for small entities.
#   GST (Goods and Services Tax): flat 15% rate — no reduced rates (unlike Australia). One of
#   the broadest GST bases in the world, with very limited exemptions (financial services,
#   fine metals). Returns typically filed monthly or 2-monthly.
#   Corporate income tax: 28% (companies); 33% (trusts); 28% (Māori authorities).
#   PAYE (Pay As You Earn): employer withholds income tax from wages; remitted to IRD.
#   KiwiSaver: voluntary (with mandatory employer minimum): employer contributes 3% of gross
#   wages for enrolled employees (mandatory employer contribution since 2013).
#   Accident Compensation Corporation (ACC): employer ACC levy (Work account) varies by industry.
#   NZD is the functional currency; AUD accounts common for trans-Tasman entities.
#   Account codes follow Xero NZ default ranges.

