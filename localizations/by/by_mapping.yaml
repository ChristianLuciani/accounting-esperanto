# Kontablo Localization Mapping: Belarus (НСБУ — Национальные стандарты бухгалтерского учёта)
# Version: 0.1.0-draft
# Authority: Ministry of Finance of the Republic of Belarus (Министерство финансов РБ)
# Standard: НСБУ (National Accounting Standards of Belarus); Instruction on Chart of Accounts 50/2011
# Critical Notes:
#   VAT: 20% standard; 10% reduced (food, medical products, children's goods)
#   Corporate income tax: 20%
#   Currency: BYN (Belarusian Ruble; new denomination since 2016, 1 BYN = 10,000 old BYR)
#   SANCTIONS CONTEXT: Belarus subject to EU/US/UK/international sanctions since 2020-2022
#   IFRS adoption is limited; mandatory plan счетов (Plan of Accounts) from Soviet tradition
#   Plan of Accounts: Instruction approved by MF Resolution 50/2011 (amended), classes 0-9
#   Class 0: Non-current assets; Class 1: Inventories; Class 2: Cost items; Class 3: Manufacturing costs
#   Class 4: Cash & settlements; Class 5-6: Source of funds; Class 7-8: Revenue & expenses; Class 9: Off-balance
#   VERIFY: Codes follow the official Plan schotov (Plan of Accounts) per MF Instruction 50/2011

