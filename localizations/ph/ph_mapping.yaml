# Kontablo Localization Mapping: Philippines (PFRS — Philippine Financial Reporting Standards)
# Version: 0.1.0-draft
# Authority: FRSC (Financial Reporting Standards Council) under the PRC (Professional Regulation
#            Commission). SEC (Securities and Exchange Commission Philippines) mandates PFRS for
#            covered entities. BSP (Bangko Sentral ng Pilipinas) for banks.
# Standard: PFRS = IFRS as adopted by the FRSC without modification for public-interest entities.
#           PFRS for SMEs for smaller entities. Governed by: Revised Corporation Code (R.A. 11232),
#           Securities Regulation Code (R.A. 8799), and related SEC Memorandum Circulars.
# Critical Notes:
#   No mandatory national chart of accounts for private-sector companies.
#   Codes below reflect common practice consistent with PFRS and Philippine CPA board exam materials.
#   EVAT (Expanded Value Added Tax): 12% standard rate (R.A. 9337 as amended).
#     Exempt: agriculture, education, books, senior citizens, PWDs (R.A. 10963 TRAIN Law).
#     Zero-rated: exports, BPO services to non-residents.
#   Corporate Income Tax (CIT): 25% standard rate (CREATE Act, R.A. 11534, effective July 2020).
#     MSME rate: 20% if net taxable income ≤ PHP 5M and total assets ≤ PHP 100M.
#     MCIT (Minimum Corporate Income Tax): 2% of gross income (suspended per CREATE Act then reinstated).
#   Withholding Tax (BIR — Bureau of Internal Revenue): expanded withholding varies by income type.
#   SSS (Social Security System): employer ~9.5%, employee ~4.5% (2023 schedule).
#   PhilHealth: employer 2.5%, employee 2.5% (income-based, total 5%).
#   Pag-IBIG (HDMF): employer PHP 100/month, employee PHP 100/month (standard).
#   Currency: PHP (Philippine Peso).
# VERIFY: CIT rate — CREATE Act reduced from 30% to 25%; confirm no further amendments in 2026.
# VERIFY: SSS contribution schedule — graduated increases per R.A. 11199; confirm 2026 rate.
# VERIFY: EVAT zero-rating scope — RMC 24-2022 expansions; confirm current BIR issuances.

