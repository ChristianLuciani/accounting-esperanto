# Kontablo Localization Mapping: Georgia (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: SARAS (Service for Accounting, Reporting and Auditing Supervision)
# Standard: IFRS as adopted (mandatory for PIEs — Public Interest Entities)
# Critical Notes:
#   VAT (დღგ — დამატებული ღირებულების გადასახადი): 18%
#   Corporate tax: 15% — UNIQUE MODEL: Georgian CIT uses an Estonian-style distribution tax
#   The 15% CIT applies ONLY ON DISTRIBUTIONS (dividends, gifts, non-business expenses)
#   Undistributed corporate profits are NOT taxed at the entity level
#   This is a fundamental difference from standard CIT — affects liability recognition
#   IFRS IAS 12 deferred tax application is modified in Georgia given this tax model
#   Currency: GEL (Georgian Lari)
#   SARAS established 2016 to enforce accounting and audit standards
#   VERIFY: exact scope of PIE definition under Georgian law

