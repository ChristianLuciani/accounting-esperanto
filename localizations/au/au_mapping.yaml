# Kontablo Localization Mapping: Australia (Australian GAAP / AASB)
# Version: 0.1.0-draft
# Authority: AASB (Australian Accounting Standards Board) / ASIC (Australian Securities and
#           Investments Commission) / ATO (Australian Taxation Office)
# Standard: Australian Accounting Standards (AASB) — substantially IFRS-aligned since 2005
#           under the Corporations Act 2001 (Cth). Small entities may use AASB 1060
#           (General Purpose Financial Statements — Simplified Disclosures, replacing Tier 2).
# Critical Notes:
#   Australia does not mandate a specific chart of accounts. The dominant SME practice
#   follows the Xero / MYOB / QuickBooks Australia default chart, using a numeric range system.
#   AASB standards are IFRS-equivalent for Tier 1 (publicly accountable) entities; Tier 2
#   uses simplified disclosures (AASB 1060, effective 2022). Small proprietary companies
#   may be exempt from audit and financial statement filing.
#   GST (Goods and Services Tax): flat 10% rate, minimal reduced/exempt categories.
#   GST-free: fresh food, medical, educational, financial services, exports.
#   Corporate income tax: 30% standard rate; 25% for Base Rate Entities (BREs) with
#   aggregated turnover < AUD 50M and passive income ≤ 80% (2024).
#   Payroll tax: levied by each state/territory at varying rates (4.75%–6.85%) above thresholds.
#   Superannuation Guarantee (SG): mandatory employer super contribution rate 11.5% (Jul 2024),
#   rising to 12% by Jul 2025. Paid to an employee's chosen super fund.
#   FBT (Fringe Benefits Tax): 47% employer tax on fringe benefits (separate from income tax).
#   Account codes follow Xero Australia default ranges widely used by Australian SMEs.

