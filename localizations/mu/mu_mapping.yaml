# Kontablo Localization Mapping: Mauritius (IFRS as adopted)
# Version: 0.1.0-draft
# Authority: Mauritius Institute of Professional Accountants (MIPA)
# Standard: IFRS as adopted; Financial Reporting Act 2004
# Critical Notes:
#   VAT: 15% standard rate (MRA — Mauritius Revenue Authority)
#   Corporate tax: 15% flat rate (one of the lowest in Africa)
#   Global Business Companies (GBC): may qualify for partial tax exemption; 80% deemed exemption on foreign income
#   Currency: Mauritian Rupee (MUR)
#   Financial hub: strong banking, fund management, and global business sector
#   IFC (International Finance Centre) regime: GBC1/GBC2 entities have different tax treatment — VERIFY current post-2019 reform
#   MIPA is IFAC member; IFRS adoption is complete and well-enforced
#   Sugar production and tourism alongside financial services

