# Kontablo Localization Mapping: Tunisia (SCE — Système Comptable des Entreprises)
# Version: 0.1.0-draft
# Authority: Conseil National de la Comptabilité (CNC Tunisia)
# Standard: SCE — Système Comptable des Entreprises (1997, Law No. 96-112)
# Critical Notes:
#   SCE is a MANDATORY chart of accounts; French-influenced; class structure 1-9
#   VAT (TVA): 19% standard rate (reduced rates: 13%, 7%; VERIFY current rates)
#   Corporate tax (IS): 15% for most companies; 25% for banks/insurance/telecom; 35% for certain sectors
#   Currency: TND (Tunisian Dinar) — partially convertible; capital controls apply
#   SCE uses same class structure as French PCG but adapted for Tunisian fiscal law
#   NCF (Norme Comptable Financière) standards issued by CNC

