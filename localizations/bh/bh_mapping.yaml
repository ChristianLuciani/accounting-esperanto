# Kontablo Localization Mapping: Bahrain (IFRS adopted)
# Version: 0.1.0-draft
# Authority: BACA (Bahrain Accountants and Auditors Association)
# Standard: IFRS as adopted; supervised by CBB (Central Bank of Bahrain) for financial entities
# Critical Notes:
#   VAT introduced January 2019 at 5%; increased to 10% January 2022
#   VAT 10% standard rate (2022+); zero-rated: exports, international transport, oil/gas upstream
#   No corporate income tax for most sectors — major competitive advantage
#   Exception: oil and gas companies subject to 46% tax on net income
#   Currency: BHD (Bahraini Dinar) — pegged to USD at BHD 0.376 = USD 1.00 since 1980
#   BHD peg is among the most stable in the GCC; USD equivalent commonly used
#   NBR (National Bureau for Revenue) administers VAT
#   Fiscal year: calendar year for most; some regulated entities use other year-ends

