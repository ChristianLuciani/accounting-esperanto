# Kontablo Localization Mapping: Egypt (Egyptian Accounting Standards — EAS)
# Version: 0.1.0-draft
# Authority: ESAA (Egyptian Society of Accountants and Auditors) / Ministry of Investment
#            Financial Regulatory Authority (FRA) for capital-market entities
# Standard: Egyptian Accounting Standards (EAS), issued 2006, revised 2015
#            EAS are IFRS-aligned; full IFRS required for banks and listed companies
#            per Egyptian Exchange (EGX) rules and Central Bank of Egypt (CBE) directives.
# Critical Notes:
#   Egypt does not mandate a national chart of accounts for private-sector entities.
#   Codes below follow common practice consistent with EAS and Egyptian CPA education materials.
#   VAT (ضريبة القيمة المضافة — Daribat al-Qima al-Mudafa): 14% standard rate,
#     introduced by Value Added Tax Law No. 67 of 2016 (replaced the General Sales Tax).
#     Reduced rate 5% on certain machinery/equipment. Exempt: basic foodstuffs, medicine.
#   Corporate Income Tax: 22.5% standard rate (Income Tax Law No. 91 of 2005 as amended).
#   Withholding Tax: varies by payment type (dividends 10%, interest 20% on non-residents).
#   Islamic finance instruments (Murabaha, Sukuk, Ijara) are relevant for banking sector;
#     dedicated accounts may be required per CBE guidelines for Islamic banks.
#   Currency: EGP (Egyptian Pound). Significant depreciation history; FX revaluation
#     entries are material for import-dependent sectors.
#   Social Insurance: employer ~26%, employee ~14% of insurable wage (Law No. 148 of 2019).
# VERIFY: EAS revision status post-2015 — confirm whether EAS 2022 amendments are in force.
# VERIFY: VAT rate — confirmed 14% as of 2026; verify any COVID-era temporary changes were reversed.

