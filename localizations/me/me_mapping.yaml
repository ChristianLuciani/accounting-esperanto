# Kontablo Localization Mapping: Montenegro (Zakon o računovodstvu / IFRS)
# Version: 0.1.0-draft
# Authority: Institute of Certified Accountants of Montenegro (Institut sertifikovanih računovođa)
# Standard: Law on Accounting (Zakon o računovodstvu 2013, amended); IFRS for larger entities
# Critical Notes:
#   VAT (PDV): 21% standard; 7% reduced (basic food, medicines, books, accommodation, water)
#   Corporate income tax: 15%
#   Currency: EUR (unilateral adoption since 2002; Montenegro is NOT an EU member state)
#   No mandatory uniform chart; Yugoslav-influenced classes 0-9 used in practice
#   IFRS mandatory for public interest entities; Montenegrin Accounting Standards (MSFI/MRS) for others
#   Class 0: Non-current assets; Class 1: Inventories; Class 2: Cash and short-term items
#   Class 3: Capital; Class 4: Costs; Class 5: Cost of sales; Class 6: Revenue; Class 7: Expenses
#   VERIFY: Codes follow common Montenegrin practice; confirm with current Zakon o računovodstvu

