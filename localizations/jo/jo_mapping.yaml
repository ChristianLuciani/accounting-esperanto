# Kontablo Localization Mapping: Jordan (IFRS adopted)
# Version: 0.1.0-draft
# Authority: JAA (Jordanian Association of Accountants) / JBA (Jordan Bar Association for CPAs)
# Standard: IFRS as adopted; regulated by Ministry of Industry and Trade
# Critical Notes:
#   GST (General Sales Tax) 16% general rate; 0% for basic food, medicine, exports
#   Reduced rates for specific sectors (tourism, hotels 8%)
#   Corporate Income Tax: 20% general; 35% banking and financial institutions; 24% telecom/insurance
#   Currency: JOD (Jordanian Dinar) — pegged to USD at JOD 0.709 = USD 1.00 since 1995
#   JOD peg is stable; USD widely accepted; financial statements often maintained in JOD
#   Income Tax Department (ITD) under Ministry of Finance is the tax authority
#   Jordan also applies withholding tax (WHT) on dividends, interest, royalties
#   Fiscal year: calendar year (January 1 – December 31)

