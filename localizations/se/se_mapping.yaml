# Kontablo Localization Mapping: Sweden (BAS-kontoplanen)
# Version: 0.1.0-draft
# Authority: BAS-kontogruppen (www.bas.se) / BFN (Bokföringsnämnden — Swedish Accounting Standards Board)
# Standard: BAS 2024 (Bas-kontoplanen, version 2024); K2 and K3 regulatory frameworks
# Critical Notes:
#   BAS (Bas-kontoplanen) is Sweden's de-facto standard chart of accounts. It is NOT legally
#   mandatory but is used by the overwhelming majority of Swedish companies and is integrated
#   into all Swedish accounting software. BAS uses a 4-digit code system structured in classes:
#     Class 1: Assets (Tillgångar)
#     Class 2: Liabilities and Equity (Skulder och eget kapital)
#     Class 3: Revenue (Intäkter)
#     Classes 4-6: Expenses by function / COGS, Personnel, Other
#     Class 7: Personnel costs (alternative)
#     Class 8: Financial income/expense, tax, extraordinary
#   Regulatory frameworks: K1 (micro), K2 (small), K3 (larger / IFRS-like). Listed companies
#   use IFRS as adopted by EU.
#   VAT (Moms — Mervärdesskatt): standard rate 25%; reduced rates 12% (food, hotels) and 6% (books, transport).
#   Corporate income tax: 20.6% (since 2021).
#   BAS codes below are from BAS 2024. The full BAS chart has ~1,200 accounts; this mapping
#   covers the primary accounts used in SME practice.

