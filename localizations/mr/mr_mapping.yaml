# Kontablo Localization Mapping: Mauritania (SYSCOHADA)
# Version: 0.1.0-draft
# Authority: Direction Générale des Impôts de Mauritanie / Ordre des Experts Comptables
# Standard: SYSCOHADA (OHADA Uniform Act on Accounting and Financial Information — AUDCIF 2017)
# Critical Notes:
#   Currency: MRU (Mauritanian Ouguiya; redenominated January 2018; 1 MRU = 10 old MRO).
#   TVA (VAT): 16% standard rate. Authority: Direction Générale des Impôts.
#   Corporate income tax (IS — Impôt sur les Sociétés): 25% standard rate.
#   Mining sector dominant (iron ore via SNIM; gold; copper). Sector-specific royalty accounts relevant.
#   Official languages: Arabic (official) and French (administrative/commercial).
#   SYSCOHADA class codes 1-8 apply; Arabic transliteration of account names noted where available.

