# Kontablo Localization Mapping: Iraq (IFRS as adopted — post-2003 transition)
# Version: 0.1.0-draft
# Authority: Iraqi Board of Accounting and Auditing Standards (IBAAS)
# Standard: IFRS as adopted (transition ongoing since 2003)
# Critical Notes:
#   VAT: NOT YET IMPLEMENTED as of 2024 (VERIFY — Iraq has no general VAT; sales tax exists
#   in limited form; a VAT system has been discussed but not enacted)
#   Corporate tax (CIT): 15% standard; 35% for oil and gas companies
#   Currency: IQD (Iraqi Dinar)
#   Oil-dominated economy: >90% of government revenue from oil; significant PSA (Production
#   Sharing Agreements) accounting is sector-specific
#   RECONSTRUCTION CONTEXT: significant infrastructure and institutional rebuilding
#   Kurdish Regional Government (KRG) has semi-autonomous tax administration in Kurdistan Region
#   VERIFY: IBAAS current operational status and exact IFRS adoption scope
#   USD widely used for large transactions alongside IQD

