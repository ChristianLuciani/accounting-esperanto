# Kontablo Localization Mapping: Syria (Local accounting standards — conflict-disrupted)
# Version: 0.1.0-draft
# Authority: Syrian Society of Accountants and Auditors (SSAA) / Ministry of Finance Syria
# Standard: Syrian Accounting Standards (based on pre-2011 adoption of IFRS framework;
#   implementation disrupted by civil war). Some IFRS-aligned standards adopted pre-2011.
# Critical Notes:
#   VERIFY ALL ENTRIES — Syria's accounting infrastructure has been severely disrupted by
#   the civil war (2011–present) and subsequent political transitions (Assad government fell
#   December 2024; transitional authority in place as of 2025). Formal accounting regulation
#   under HTS/transitional authority is not yet standardized.
#   Currency: SYP (Syrian Pound). Severely devalued — official rate vs black market diverge
#   significantly. IAS 29 hyperinflation criteria have been met (cumulative inflation well
#   exceeds 100% over 3 years). IAS 21 foreign currency and IAS 29 hyperinflation adjustments
#   are mandatory for any IFRS-compliant reporting.
#   Sanctions: US, EU, and other sanctions affect banking access. USD and Turkish Lira
#   widely used in commerce in northern/opposition areas.
#   Corporate income tax: pre-war rate was 28% (corporate income tax). Current enforcement
#   and rates under transitional authority unclear. VERIFY.
#   VAT: Syria had a General Sales Tax of 10% pre-2011; current status unclear. VERIFY.
#   Sources: pre-2011 Syrian accounting standards documentation; World Bank Syria reconstruction
#   assessments; IMF Syria reports (last Article IV pre-war).

