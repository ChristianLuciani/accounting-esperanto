# Kontablo Localization Mapping: Nigeria (FRCN / IFRS-NG)
# Version: 0.1.0-draft
# Authority: Financial Reporting Council of Nigeria (FRCN)
# Standard: IFRS as adopted in Nigeria (full IFRS for public companies)
# Critical Notes:
#   - Nigeria adopted full IFRS for public companies in 2012
#   - IFRS for SMEs adopted for smaller entities
#   - HIGH INFLATION RISK: Naira (NGN) experienced significant devaluation
#   - Oil & Gas sector has specific NFRS/IFRS 6 requirements (dominant industry)
#   - Withholding Tax (WHT) is a key compliance account (5-10% rates)

metadata:
  country: ng
  authority: FRCN (Financial Reporting Council of Nigeria)
  standard: ifrs_ng_2024
  kontablo_version: 0.1.0
  last_updated: 2026-03-13
  inflation_risk: HIGH # Monitor for IAS 29 applicability threshold
  dominant_industry: oil_gas_telecoms_banking

