# Kontablo Localization Mapping: Lithuania (VAS — Verslo apskaitos standartai)
# Version: 0.1.0-draft
# Authority: AudFi (Audito ir apskaitos tarnyba — Audit and Accounting Service of Lithuania)
# Standard: VAS (Lithuanian Business Accounting Standards); IFRS for listed entities
# Critical Notes:
#   VAT (PVM): 21% standard; 9% reduced (heating, books, press, hotels); 5% super-reduced (medicines)
#   Corporate income tax: 15% (standard); 0%/5% for small companies meeting criteria
#   Currency: EUR (member since 2015)
#   No mandatory uniform chart, but VAS prescribe account groups 1-9
#   Class 1: Non-current assets; Class 2: Current assets; Class 3: Equity
#   Class 4: Grants and subsidies; Class 5: Liabilities; Class 6: Revenue; Class 7: Expenses
#   VERIFY: Account codes are firm-specific; numbers below are common-practice illustrations

