# Kontablo Localization Mapping: Timor-Leste / East Timor (IFRS / transitional)
# Version: 0.1.0-draft
# Authority: Ministry of Finance (Ministério das Finanças) / CGA (Câmara dos Revisores Oficiais de Contas)
# Standard: IFRS as adopted (aspirational for large entities); Portuguese-influenced transitional standards
#            for smaller entities. Accounting infrastructure still developing.
# Critical Notes:
#   - Currency: USD (official currency since independence 2002; centavo coins exist but rarely used)
#     No domestic currency issued; USD eliminates exchange rate risk domestically
#   - Corporate Income Tax (IRTS — Imposto sobre o Rendimento de Pessoas Coletivas): 10%
#     One of the lowest corporate tax rates in Southeast Asia
#   - Withholding Tax (Retenção na Fonte): applies to wages, services, dividends
#   - VAT equivalent: ISC (Imposto de Serviços e Consumo) — limited implementation in practice
#   - Petroleum Fund (Fundo Petrolífero): sovereign wealth fund fed by petroleum revenues (Bayu-Undan,
#     Greater Sunrise); critical for government accounting; governed by Petroleum Fund Law 9/2005
#   - Economy heavily dependent on petroleum revenues (Timor Sea); Bayu-Undan field winding down;
#     Greater Sunrise development in negotiation with Australia
#   - Official languages: Tetum and Portuguese; Indonesian and English also used commercially
#   - Independence: May 20, 2002 — one of the world's newest nations
#   - Large entities include: TIMOR GAP (national oil company), EDTL (electricity), BNU (banking)
#   - Account labels in Portuguese (primary official accounting language) with English translation

