# Kontablo Localization Mapping: Czech Republic (Czech GAAP / Czech Accounting Act)
# Version: 0.1.0-draft
# Authority: MF ČR (Ministerstvo financí České republiky — Ministry of Finance)
# Standard: Czech Accounting Act (Zákon č. 563/1991 Sb., o účetnictví) and implementing
#           decrees (Vyhláška č. 500/2002 Sb. for businesses; Czech Accounting Standards — ČÚS)
# Critical Notes:
#   Czech Republic mandates use of the Účtový rozvrh (chart of accounts) based on the official
#   Směrná účtová osnova (model chart of accounts) under MF ČR Decree 500/2002.
#   The chart uses a 3-digit class structure: 0=Fixed assets, 1=Inventories, 2=Short-term
#   financial assets & bank, 3=Receivables/Payables, 4=Capital/LT liabilities, 5=Costs,
#   6=Revenue, 7=Off-balance sheet.
#   Czech GAAP differs significantly from IFRS: no fair value for most instruments, cost model
#   dominant, specific rules for deferred tax and lease accounting.
#   Listed companies on Prague Stock Exchange (PSE) apply IFRS as adopted by EU.
#   VAT (DPH — Daň z přidané hodnoty): standard rate 21%; reduced 12% (food, non-alcoholic
#   beverages, drugs, books); 0% for intra-EU supplies and exports.
#   Corporate income tax (DPPO — Daň z příjmů právnických osob): 21% (2024).
#   Czech Crown (CZK) is the functional currency; EUR accounts common for export entities.

